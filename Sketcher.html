<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sketcher</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            overflow: hidden;
        }

        #container {
            display: flex;
            height: 100vh;
            gap: 0;
        }

        /* Top Toolbar */
        .toolbar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: white;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 20px;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .toolbar-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            flex: 1;
        }

        .toolbar-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .toolbar-btn {
            padding: 6px 12px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s;
            font-family: inherit;
            min-width: 40px;
            text-align: center;
        }

        .toolbar-btn:hover {
            background: #f8f8f8;
            border-color: #999;
        }

        .toolbar-btn.active {
            background: #2196F3;
            color: white;
            border-color: #2196F3;
        }

        .toolbar-btn.primary {
            background: #2196F3;
            color: white;
            border-color: #2196F3;
        }

        .toolbar-btn.primary:hover {
            background: #1976d2;
        }

        .toolbar-separator {
            width: 1px;
            height: 30px;
            background: #e0e0e0;
        }

        /* Right Corner Tools */
        .corner-tools {
            position: absolute;
            top: 70px;
            right: 20px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            z-index: 200;
            max-width: 200px;
        }

        .corner-tools h4 {
            font-size: 11px;
            font-weight: 600;
            color: #333;
            text-transform: uppercase;
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 1px solid #e0e0e0;
        }

        .corner-tools button {
            display: block;
            width: 100%;
            padding: 8px 10px;
            margin-bottom: 6px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            text-align: left;
            transition: all 0.2s;
        }

        .corner-tools button:hover {
            background: #f8f8f8;
            border-color: #999;
        }

        .corner-tools button.active {
            background: #2196F3;
            color: white;
            border-color: #2196F3;
        }

        /* Sidebar */
        #sidebar {
            position: absolute;
            top: 60px;
            left: 0;
            width: 280px;
            height: calc(100vh - 60px);
            background: white;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 20px;
            box-shadow: 2px 0 8px rgba(0,0,0,0.05);
        }

        .sidebar-section {
            margin-bottom: 25px;
        }

        .sidebar-section h3 {
            font-size: 12px;
            font-weight: 600;
            color: #333;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .tool-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            margin-bottom: 8px;
            transition: all 0.2s;
            font-weight: 500;
            width: 100%;
        }

        .tool-btn:hover {
            background: #f8f8f8;
            border-color: #999;
        }

        .tool-btn.active {
            background: #2196F3;
            color: white;
            border-color: #2196F3;
        }

        input[type="color"] {
            width: 40px;
            height: 32px;
            cursor: pointer;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        input[type="range"] {
            width: 100%;
            cursor: pointer;
            height: 5px;
        }

        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 12px;
            margin-bottom: 10px;
            font-family: inherit;
        }

        .calibration-panel {
            background: #e3f2fd;
            border: 1px solid #90caf9;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 15px;
        }

        .calibration-panel h4 {
            font-size: 12px;
            font-weight: 600;
            color: #1976d2;
            margin-bottom: 10px;
        }

        .calibration-btn {
            width: 100%;
            padding: 8px;
            background: #2196F3;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .calibration-btn:hover {
            background: #1976d2;
        }

        .calibration-info {
            font-size: 11px;
            color: #1565c0;
            margin-top: 8px;
            padding: 8px;
            background: white;
            border-radius: 4px;
            border-left: 3px solid #2196F3;
        }

        #canvas {
            position: absolute;
            top: 60px;
            left: 280px;
            right: 0;
            bottom: 0;
            cursor: crosshair;
            background: white;
            touch-action: none;
        }

        .status-bar {
            position: absolute;
            bottom: 10px;
            left: 290px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 11px;
            z-index: 150;
            font-family: 'Courier New', monospace;
        }

        @media (max-width: 768px) {
            #sidebar {
                width: 100%;
                height: auto;
                max-height: 250px;
                border-right: none;
                border-bottom: 1px solid #e0e0e0;
                top: 60px;
                left: 0;
                overflow-x: auto;
                overflow-y: auto;
            }

            #canvas {
                left: 0;
                top: 310px;
            }

            .corner-tools {
                top: 70px;
                right: 10px;
            }
        }
    </style>
</head>
<body>
    <div id="container">
        <!-- Top Toolbar -->
        <div class="toolbar">
            <div class="toolbar-title">📐 Screen Sketch</div>
            
            <div class="toolbar-group">
                <span style="font-size: 12px; color: #666; font-weight: 500;">Tools:</span>
                <button class="toolbar-btn active" data-tool="line" title="Line">Line</button>
                <button class="toolbar-btn" data-tool="circle" title="Circle">Circle</button>
                <button class="toolbar-btn" data-tool="rectangle" title="Rectangle">Rect</button>
                <button class="toolbar-btn" data-tool="dimension" title="Dimension">Dim</button>
            </div>

            <div class="toolbar-separator"></div>

            <div class="toolbar-group">
                <input type="color" id="colorPicker" value="#000000" title="Color">
                <input type="range" id="widthSlider" min="1" max="5" value="2" style="width: 80px;" title="Line Width">
                <span id="widthDisplay" style="font-size: 12px; color: #666;">2</span>
            </div>

            <div class="toolbar-separator"></div>

            <div class="toolbar-group">
                <button class="toolbar-btn primary" id="exportPNG" title="Export PNG">📥 PNG</button>
                <button class="toolbar-btn primary" id="exportSVG" title="Export SVG">📥 SVG</button>
                <button class="toolbar-btn primary" id="exportPDF" title="Export PDF">📥 PDF</button>
            </div>

            <div class="toolbar-separator"></div>

            <div class="toolbar-group">
                <button class="toolbar-btn" id="undoBtn" title="Undo">↶ Undo</button>
                <button class="toolbar-btn" id="clearBtn" title="Clear All">🗑️</button>
            </div>
        </div>

        <!-- Right Corner Tools -->
        <div class="corner-tools">
            <h4>Advanced</h4>
            <button class="toolbar-btn" data-tool="arc" title="Arc">🌙 Arc</button>
            <button class="toolbar-btn" data-tool="arc-multi" title="Multi-point Arc">〰️ Arc Multi</button>
            <button class="toolbar-btn" data-tool="point" title="Point">• Point</button>
            <button class="toolbar-btn" data-tool="fillet" title="Fillet">⌒ Fillet</button>
            <button class="toolbar-btn" data-tool="chamfer" title="Chamfer">⬟ Chamfer</button>
            <button class="toolbar-btn" data-tool="mirror" title="Mirror">↔ Mirror</button>
            <button class="toolbar-btn" data-tool="delete" title="Delete">✕ Delete</button>
        </div>

        <!-- Left Sidebar -->
        <div id="sidebar">
            <div class="sidebar-section">
                <h3>Calibration</h3>
                <div class="calibration-panel">
                    <h4>Auto-Calibrate</h4>
                    <p style="font-size: 11px; color: #1565c0; margin-bottom: 10px;">Draw a known size reference</p>
                    <input type="number" id="refLength" placeholder="Reference size (cm)" min="0" step="0.1">
                    <button class="calibration-btn" id="calibrateBtn">Calibrate</button>
                    <div id="calibrationInfo" class="calibration-info" style="display: none;"></div>
                </div>
            </div>

            <div class="sidebar-section">
                <h3>Display</h3>
                <label style="font-size: 12px; display: flex; align-items: center; gap: 8px; cursor: pointer; margin-bottom: 8px;">
                    <input type="checkbox" id="showGrid" checked>
                    Show Grid
                </label>
                <label style="font-size: 12px; display: flex; align-items: center; gap: 8px; cursor: pointer; margin-bottom: 8px;">
                    <input type="checkbox" id="showPoints" checked>
                    Show Points
                </label>
                <label style="font-size: 12px; display: flex; align-items: center; gap: 8px; cursor: pointer;">
                    <input type="checkbox" id="snapEnabled" checked>
                    Smart Snap
                </label>
            </div>

            <div class="sidebar-section">
                <h3>Snap Settings</h3>
                <div style="font-size: 11px; color: #666; padding: 8px; background: #f5f5f5; border-radius: 4px;">
                    <p><strong>✓ Endpoint snap</strong></p>
                    <p><strong>✓ Midpoint snap</strong></p>
                    <p><strong>✓ Center snap</strong></p>
                    <p><strong>✓ Auto-connect lines</strong></p>
                </div>
            </div>

            <div class="sidebar-section">
                <h3>Info</h3>
                <div style="font-size: 11px; color: #666; padding: 8px; background: #f5f5f5; border-radius: 4px;">
                    <p id="coordDisplay">X: 0 Y: 0</p>
                    <p id="toolDisplay" style="margin-top: 5px;">Tool: Line</p>
                </div>
            </div>
        </div>

        <!-- Canvas -->
        <canvas id="canvas"></canvas>

        <!-- Status Bar -->
        <div class="status-bar" id="statusBar"></div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // State
        let currentTool = 'line';
        let currentColor = '#000000';
        let currentStrokeWidth = 2;
        let isDrawing = false;
        let startX, startY;
        let shapes = [];
        let points = [];
        let history = [];
        let pixelsPerCm = null;
        let showGrid = true;
        let showPoints = true;
        let snapEnabled = true;
        const SNAP_DISTANCE = 15;

        // Canvas setup
        function resizeCanvas() {
            const sidebar = document.getElementById('sidebar');
            canvas.width = window.innerWidth - sidebar.offsetWidth;
            canvas.height = window.innerHeight - 60;
            redraw();
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Toolbar
        document.querySelectorAll('[data-tool]').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('[data-tool]').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTool = btn.dataset.tool;
                document.getElementById('toolDisplay').textContent = 'Tool: ' + currentTool.charAt(0).toUpperCase() + currentTool.slice(1);
            });
        });

        document.getElementById('colorPicker').addEventListener('change', (e) => {
            currentColor = e.target.value;
        });

        document.getElementById('widthSlider').addEventListener('input', (e) => {
            currentStrokeWidth = e.target.value;
            document.getElementById('widthDisplay').textContent = e.target.value;
        });

        // Display options
        document.getElementById('showGrid').addEventListener('change', (e) => {
            showGrid = e.target.checked;
            redraw();
        });

        document.getElementById('showPoints').addEventListener('change', (e) => {
            showPoints = e.target.checked;
            redraw();
        });

        document.getElementById('snapEnabled').addEventListener('change', (e) => {
            snapEnabled = e.target.checked;
        });

        // Calibration
        document.getElementById('calibrateBtn').addEventListener('click', () => {
            if (shapes.length === 0) {
                alert('Draw a line first to use as reference');
                return;
            }
            const refLength = parseFloat(document.getElementById('refLength').value);
            if (!refLength) {
                alert('Enter reference length in cm');
                return;
            }

            const lastShape = shapes[shapes.length - 1];
            if (lastShape.type !== 'line') {
                alert('Select a line as reference');
                return;
            }

            const dx = lastShape.x2 - lastShape.x1;
            const dy = lastShape.y2 - lastShape.y1;
            const pixelLength = Math.sqrt(dx * dx + dy * dy);
            pixelsPerCm = pixelLength / refLength;

            const info = document.getElementById('calibrationInfo');
            info.textContent = `✓ Calibrated: ${pixelsPerCm.toFixed(2)} px/cm`;
            info.style.display = 'block';
        });

        // Snapping
        function findSnapPoint(x, y) {
            if (!snapEnabled) return {x, y};

            let nearest = {x, y, dist: SNAP_DISTANCE};

            // Check endpoint snap
            shapes.forEach(shape => {
                if (shape.type === 'line' || shape.type === 'arc') {
                    const points = [[shape.x1, shape.y1], [shape.x2, shape.y2]];
                    points.forEach(([px, py]) => {
                        const dist = Math.hypot(x - px, y - py);
                        if (dist < nearest.dist) {
                            nearest = {x: px, y: py, dist};
                        }
                    });
                }

                // Midpoint snap
                if (shape.type === 'line') {
                    const mx = (shape.x1 + shape.x2) / 2;
                    const my = (shape.y1 + shape.y2) / 2;
                    const dist = Math.hypot(x - mx, y - my);
                    if (dist < nearest.dist) {
                        nearest = {x: mx, y: my, dist};
                    }
                }

                // Center snap for circles
                if (shape.type === 'circle') {
                    const dist = Math.hypot(x - shape.x1, y - shape.y1);
                    if (dist < nearest.dist) {
                        nearest = {x: shape.x1, y: shape.y1, dist};
                    }
                }
            });

            // Point snap
            points.forEach(p => {
                const dist = Math.hypot(x - p.x, y - p.y);
                if (dist < nearest.dist) {
                    nearest = {x: p.x, y: p.y, dist};
                }
            });

            return nearest.dist < SNAP_DISTANCE ? {x: nearest.x, y: nearest.y} : {x, y};
        }

        // Canvas interactions
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            document.getElementById('coordDisplay').textContent = `X: ${Math.round(x)} Y: ${Math.round(y)}`;
            document.getElementById('statusBar').textContent = `${currentTool} | ${Math.round(x)}, ${Math.round(y)}`;

            if (!isDrawing) return;

            redraw();
            drawPreview(x, y);
        });

        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            let x = e.clientX - rect.left;
            let y = e.clientY - rect.top;

            const snapped = findSnapPoint(x, y);
            x = snapped.x;
            y = snapped.y;

            if (currentTool === 'point') {
                points.push({x, y});
                history.push(JSON.stringify({shapes, points}));
                redraw();
            } else if (currentTool === 'delete') {
                deleteAtPoint(x, y);
                history.push(JSON.stringify({shapes, points}));
                redraw();
            } else {
                isDrawing = true;
                startX = x;
                startY = y;
                history.push(JSON.stringify({shapes, points}));
            }
        });

        canvas.addEventListener('mouseup', (e) => {
            if (!isDrawing) return;
            isDrawing = false;

            const rect = canvas.getBoundingClientRect();
            let x = e.clientX - rect.left;
            let y = e.clientY - rect.top;

            const snapped = findSnapPoint(x, y);
            x = snapped.x;
            y = snapped.y;

            addShape(startX, startY, x, y);
            redraw();
        });

        function addShape(x1, y1, x2, y2) {
            const shape = {
                type: currentTool,
                x1, y1, x2, y2,
                color: currentColor,
                width: currentStrokeWidth
            };

            shapes.push(shape);

            // Auto add center point for circles
            if (currentTool === 'circle') {
                points.push({x: x1, y: y1});
            }
        }

        function drawPreview(endX, endY) {
            ctx.strokeStyle = currentColor;
            ctx.lineWidth = currentStrokeWidth;
            ctx.globalAlpha = 0.6;

            switch(currentTool) {
                case 'line':
                    ctx.beginPath();
                    ctx.moveTo(startX, startY);
                    ctx.lineTo(endX, endY);
                    ctx.stroke();
                    break;

                case 'circle':
                    const r = Math.hypot(endX - startX, endY - startY);
                    ctx.beginPath();
                    ctx.arc(startX, startY, r, 0, 2 * Math.PI);
                    ctx.stroke();
                    break;

                case 'rectangle':
                    ctx.strokeRect(startX, startY, endX - startX, endY - startY);
                    break;

                case 'arc':
                    const angle = Math.atan2(endY - startY, endX - startX);
                    const arcR = Math.hypot(endX - startX, endY - startY);
                    ctx.beginPath();
                    ctx.arc(startX, startY, arcR, 0, angle);
                    ctx.stroke();
                    break;

                case 'arc-multi':
                    const r2 = Math.hypot(endX - startX, endY - startY);
                    const angle2 = Math.atan2(endY - startY, endX - startX);
                    ctx.beginPath();
                    ctx.arc(startX, startY, r2, 0, angle2, false);
                    ctx.stroke();
                    break;

                case 'dimension':
                    ctx.beginPath();
                    ctx.moveTo(startX, startY);
                    ctx.lineTo(endX, endY);
                    ctx.stroke();
                    
                    const dist = Math.hypot(endX - startX, endY - startY);
                    const dimText = pixelsPerCm ? (dist / pixelsPerCm).toFixed(1) + 'cm' : Math.round(dist) + 'px';
                    ctx.fillStyle = currentColor;
                    ctx.font = 'bold 12px Arial';
                    ctx.fillText(dimText, (startX + endX) / 2, (startY + endY) / 2 - 10);
                    break;
            }

            ctx.globalAlpha = 1;
        }

        function redraw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Grid
            if (showGrid) {
                ctx.strokeStyle = '#f0f0f0';
                ctx.lineWidth = 1;
                for (let i = 0; i < canvas.width; i += 50) {
                    ctx.beginPath();
                    ctx.moveTo(i, 0);
                    ctx.lineTo(i, canvas.height);
                    ctx.stroke();
                }
                for (let i = 0; i < canvas.height; i += 50) {
                    ctx.beginPath();
                    ctx.moveTo(0, i);
                    ctx.lineTo(canvas.width, i);
                    ctx.stroke();
                }
            }

            // Draw shapes
            shapes.forEach(shape => {
                ctx.strokeStyle = shape.color;
                ctx.lineWidth = shape.width;
                ctx.fillStyle = 'transparent';

                switch(shape.type) {
                    case 'line':
                    case 'dimension':
                        ctx.beginPath();
                        ctx.moveTo(shape.x1, shape.y1);
                        ctx.lineTo(shape.x2, shape.y2);
                        ctx.stroke();

                        if (shape.type === 'dimension') {
                            const dist = Math.hypot(shape.x2 - shape.x1, shape.y2 - shape.y1);
                            const dimText = pixelsPerCm ? (dist / pixelsPerCm).toFixed(1) + 'cm' : Math.round(dist) + 'px';
                            ctx.fillStyle = shape.color;
                            ctx.font = 'bold 12px Arial';
                            ctx.fillText(dimText, (shape.x1 + shape.x2) / 2 + 5, (shape.y1 + shape.y2) / 2 - 10);
                        }
                        break;

                    case 'circle':
                        const r = Math.hypot(shape.x2 - shape.x1, shape.y2 - shape.y1);
                        ctx.beginPath();
                        ctx.arc(shape.x1, shape.y1, r, 0, 2 * Math.PI);
                        ctx.stroke();
                        break;

                    case 'rectangle':
                        ctx.strokeRect(shape.x1, shape.y1, shape.x2 - shape.x1, shape.y2 - shape.y1);
                        break;

                    case 'arc':
                    case 'arc-multi':
                        const angle = Math.atan2(shape.y2 - shape.y1, shape.x2 - shape.x1);
                        const arcR = Math.hypot(shape.x2 - shape.x1, shape.y2 - shape.y1);
                        ctx.beginPath();
                        ctx.arc(shape.x1, shape.y1, arcR, 0, angle);
                        ctx.stroke();
                        break;
                }
            });

            // Draw points
            if (showPoints) {
                ctx.fillStyle = '#2196F3';
                points.forEach(p => {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 5, 0, 2 * Math.PI);
                    ctx.fill();
                });
            }

            // Draw snap indicator
            if (snapEnabled) {
                ctx.strokeStyle = 'rgba(33, 150, 243, 0.3)';
                ctx.lineWidth = 1;
                ctx.setLineDash([5, 5]);
                shapes.forEach(shape => {
                    if (shape.type === 'line') {
                        ctx.beginPath();
                        ctx.moveTo(shape.x1, shape.y1);
                        ctx.lineTo(shape.x2, shape.y2);
                        ctx.stroke();
                    }
                });
                ctx.setLineDash([]);
            }
        }

        function deleteAtPoint(x, y) {
            shapes = shapes.filter(shape => {
                const d1 = Math.hypot(x - shape.x1, y - shape.y1);
                const d2 = Math.hypot(x - shape.x2, y - shape.y2);
                return Math.min(d1, d2) > 10;
            });

            points = points.filter(p => {
                return Math.hypot(x - p.x, y - p.y) > 10;
            });
        }

        // Actions
        document.getElementById('undoBtn').addEventListener('click', () => {
            if (history.length > 0) {
                const state = JSON.parse(history.pop());
                shapes = state.shapes;
                points = state.points;
                redraw();
            }
        });

        document.getElementById('clearBtn').addEventListener('click', () => {
            if (confirm('Clear all?')) {
                shapes = [];
                points = [];
                history = [];
                redraw();
            }
        });

        // Export
        document.getElementById('exportPNG').addEventListener('click', () => {
            const link = document.createElement('a');
            link.href = canvas.toDataURL('image/png');
            link.download = 'sketch.png';
            link.click();
        });

        document.getElementById('exportSVG').addEventListener('click', () => {
            let svg = `<svg width="${canvas.width}" height="${canvas.height}" xmlns="http://www.w3.org/2000/svg">`;
            svg += `<rect width="${canvas.width}" height="${canvas.height}" fill="white"/>`;

            shapes.forEach(shape => {
                switch(shape.type) {
                    case 'line':
                    case 'dimension':
                        svg += `<line x1="${shape.x1}" y1="${shape.y1}" x2="${shape.x2}" y2="${shape.y2}" stroke="${shape.color}" stroke-width="${shape.width}"/>`;
                        break;
                    case 'circle':
                        const r = Math.hypot(shape.x2 - shape.x1, shape.y2 - shape.y1);
                        svg += `<circle cx="${shape.x1}" cy="${shape.y1}" r="${r}" fill="none" stroke="${shape.color}" stroke-width="${shape.width}"/>`;
                        break;
                    case 'rectangle':
                        svg += `<rect x="${shape.x1}" y="${shape.y1}" width="${shape.x2 - shape.x1}" height="${shape.y2 - shape.y1}" fill="none" stroke="${shape.color}" stroke-width="${shape.width}"/>`;
                        break;
                }
            });

            points.forEach(p => {
                svg += `<circle cx="${p.x}" cy="${p.y}" r="3" fill="#2196F3"/>`;
            });

            svg += '</svg>';
            const blob = new Blob([svg], {type: 'image/svg+xml'});
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'sketch.svg';
            link.click();
        });

        document.getElementById('exportPDF').addEventListener('click', () => {
            html2canvas(canvas, {backgroundColor: '#ffffff'}).then(canvasImage => {
                const imgData = canvasImage.toDataURL('image/png');
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF({
                    orientation: canvas.width > canvas.height ? 'landscape' : 'portrait',
                    unit: 'px',
                    format: [canvas.width, canvas.height]
                });
                pdf.addImage(imgData, 'PNG', 0, 0, canvas.width, canvas.height);
                pdf.save('sketch.pdf');
            });
        });

        redraw();
    </script>
</body>
</html>
