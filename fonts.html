<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e12;
    --bg2: #16161c;
    --border: #2a2a38;
    --text: #f0f0ff;
    --text2: #7070a0;
    --accent: #01c6f1;
    --tag-bg: #1e1e2e;
  }

  [data-theme="light"] {
    --bg: #f4f4f8;
    --bg2: #ffffff;
    --border: #d0d0e0;
    --text: #0e0e1a;
    --text2: #6060a0;
    --accent: #0099cc;
    --tag-bg: #ebebf2;
  }

  html { transition: background 0.3s, color 0.3s; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    padding: 40px 24px 80px;
  }

  header {
    text-align: center;
    margin-bottom: 48px;
  }

  header h1 {
    font-family: 'Big Shoulders Display', sans-serif;
    font-size: clamp(40px, 8vw, 80px);
    font-weight: 900;
    letter-spacing: -1px;
    background: linear-gradient(90deg, #01c6f1, #6aff7e);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }

  header p {
    color: var(--text2);
    font-size: 13px;
    margin-top: 10px;
  }

  /* Sticky search + filters */
  .controls {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 14px 0 12px;
    margin-bottom: 32px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .search-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    max-width: 500px;
    width: 100%;
    margin: 0 auto;
  }

  .search-wrap svg { flex-shrink: 0; color: var(--text2); }

  .search-wrap input {
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    width: 100%;
  }

  .search-wrap input::placeholder { color: var(--text2); }

  .preview-text-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    max-width: 500px;
    margin: 0 auto;
    width: 100%;
  }

  .preview-text-wrap label { font-size: 11px; color: var(--text2); white-space: nowrap; }

  .preview-text-wrap input {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 12px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    flex: 1;
    outline: none;
  }

  .cat-tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
  }

  .cat-tab {
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--tag-bg);
    color: var(--text2);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .cat-tab:hover { border-color: var(--accent); color: var(--accent); }
  .cat-tab.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 600; }

  /* Category sections */
  .section {
    margin-bottom: 48px;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .section-title {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text2);
  }

  .section-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .section-count {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--border);
  }

  /* Font grid */
  .font-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
  }

  .font-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px 14px;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.1s, box-shadow 0.15s;
    position: relative;
    overflow: hidden;
    user-select: none;
  }

  .font-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(1,198,241,0.1);
  }

  .font-card.selected {
    border-color: #6aff7e;
    box-shadow: 0 0 0 1px #6aff7e, 0 8px 24px rgba(106,255,126,0.15);
  }

  .font-card.selected::after {
    content: '✓';
    position: absolute;
    top: 10px;
    right: 12px;
    width: 22px;
    height: 22px;
    background: #6aff7e;
    color: #000;
    border-radius: 50%;
    font-size: 12px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 22px;
    text-align: center;
  }

  .font-preview {
    font-size: 32px;
    line-height: 1.15;
    margin-bottom: 10px;
    color: var(--text);
    min-height: 44px;
    word-break: break-word;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }

  .font-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .font-name {
    font-size: 11px;
    color: var(--text2);
    font-family: 'DM Mono', monospace;
  }

  .font-tag {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 4px;
    background: var(--tag-bg);
    border: 1px solid var(--border);
    color: var(--text2);
    font-family: 'DM Mono', monospace;
  }

  /* Selected panel */
  .selected-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: #0a0a10;
    border-top: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    transform: translateY(100%);
    transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 200;
  }

  .selected-bar.show { transform: translateY(0); }

  .selected-info {
    font-size: 12px;
    color: var(--text2);
  }

  .selected-info strong { color: #6aff7e; font-size: 14px; }

  .selected-actions { display: flex; gap: 8px; }

  .btn {
    padding: 8px 18px;
    border-radius: 8px;
    border: none;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .btn:hover { opacity: 0.8; }
  .btn-clear { background: var(--bg2); color: var(--text2); border: 1px solid var(--border); }
  .btn-copy { background: var(--accent); color: #000; font-weight: 600; }

  /* Toast */
  .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: #6aff7e;
    color: #000;
    padding: 10px 20px;
    border-radius: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 300;
    pointer-events: none;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  .no-results {
    text-align: center;
    color: var(--text2);
    font-size: 14px;
    padding: 60px 0;
  }

  .hidden { display: none !important; }
</style>
</head>

  const w = f.weight || '700';
  const s = f.size || '32px';
  return `font-family:'${f.name}',sans-serif;font-weight:${w};font-size:${s};`;
}

function renderSections() {
  const q = document.getElementById('search').value.toLowerCase();
  const sectionsEl = document.getElementById('font-sections');
  sectionsEl.innerHTML = '';

  const cats = activecat === 'All' ? CATS : [activecat];
  let anyVisible = false;

  cats.forEach(cat => {
    const fonts = FONTS.filter(f =>
      f.cat === cat && f.name.toLowerCase().includes(q)
    );
    if (!fonts.length) return;
    anyVisible = true;

    const sec = document.createElement('div');
    sec.className = 'section';
    sec.innerHTML = `
      <div class="section-header">
        <span class="section-title">${cat}</span>
        <div class="section-line"></div>
        <span class="section-count">${fonts.length}</span>
      </div>
      <div class="font-grid" id="grid-${cat.replace(/\W/g,'_')}"></div>
    `;
    sectionsEl.appendChild(sec);

    const grid = sec.querySelector('.font-grid');
    fonts.forEach(f => {
      const card = document.createElement('div');
      card.className = 'font-card' + (selected.has(f.name) ? ' selected' : '');
      card.id = 'card-' + f.name.replace(/\s/g,'-');
      card.innerHTML = `
        <div class="font-preview" style="${getFontStyle(f)}">${previewText}</div>
        <div class="font-meta">
          <span class="font-name">${f.name}</span>
          <span class="font-tag">${cat.split(' / ')[0].toLowerCase()}</span>
        </div>
      `;
      card.onclick = () => toggleSelect(f.name);
      grid.appendChild(card);
    });
  });

  if (!anyVisible) {
    sectionsEl.innerHTML = '<div class="no-results">No fonts match your search.</div>';
  }
}

function toggleSelect(name) {
  if (selected.has(name)) {
    selected.delete(name);
  } else {
    selected.add(name);
  }
  const card = document.getElementById('card-' + name.replace(/\s/g,'-'));
  if (card) card.classList.toggle('selected', selected.has(name));
  updateSelectedBar();
}

function updateSelectedBar() {
  const bar = document.getElementById('selected-bar');
  const count = document.getElementById('sel-count');
  const names = document.getElementById('sel-names');
  if (selected.size === 0) {
    bar.classList.remove('show');
    return;
  }
  bar.classList.add('show');
  count.textContent = selected.size;
  const arr = [...selected];
  names.textContent = arr.length <= 3 ? arr.join(' · ') : arr.slice(0,3).join(' · ') + ` +${arr.length-3} more`;
}

function clearSelected() {
  selected.clear();
  document.querySelectorAll('.font-card.selected').forEach(c => c.classList.remove('selected'));
  updateSelectedBar();
}

function copyImport() {
  if (!selected.size) return;
  const families = [...selected].map(name => {
    const f = FONTS.find(x => x.name === name);
    const w = f?.weight || '700';
    return name.replace(/\s/g,'+') + ':wght@400;' + w;
  }).join('&family=');
  const url = `@import url('https://fonts.googleapis.com/css2?family=${families}&display=swap');`;
  navigator.clipboard.writeText(url).then(() => showToast('Copied @import to clipboard!'));
}

function updatePreview() {
  previewText = document.getElementById('preview-text').value || 'OnExport';
  document.querySelectorAll('.font-preview').forEach((el, i) => {
    el.textContent = previewText;
  });
}

function filterFonts() { renderSections(); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// Theme
const _saved = localStorage.getItem('theme') || 'dark';
document.documentElement.setAttribute('data-theme', _saved);
document.getElementById('nav-logo').src = _saved === 'dark' ? 'logo-dark.png' : 'logo-light.png';
if (_saved === 'light') { document.getElementById('icon-moon').style.display='none'; document.getElementById('icon-sun').style.display='block'; }
function toggleTheme() {
  const t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('nav-logo').src = t === 'dark' ? 'logo-dark.png' : 'logo-light.png';
  document.getElementById('icon-moon').style.display = t === 'dark' ? 'block' : 'none';
  document.getElementById('icon-sun').style.display  = t === 'light' ? 'block' : 'none';
  localStorage.setItem('theme', t);
}
// Init
renderSections();
</script>
</body>
</html>
