<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gridfinity Generator 3D</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 1400px;
            padding: 40px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 32px;
            color: #333;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
        }

        .content {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 40px;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 12px;
            font-weight: 600;
            color: #333;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="number"],
        input[type="range"],
        select {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 13px;
            font-family: inherit;
        }

        input[type="number"],
        select {
            width: 100%;
            transition: border-color 0.2s;
        }

        input[type="number"]:focus,
        select:focus,
        input[type="range"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        input[type="range"] {
            width: 100%;
            cursor: pointer;
            accent-color: #667eea;
            height: 6px;
        }

        .range-display {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 4px;
        }

        .range-value {
            font-size: 12px;
            color: #667eea;
            font-weight: 600;
        }

        h2 {
            font-size: 14px;
            color: #333;
            margin-top: 20px;
            margin-bottom: 0;
        }

        h2:first-child {
            margin-top: 0;
        }

        .buttons {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        button {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            border: 1px solid #ddd;
        }

        .btn-secondary:hover {
            background: #e8e8e8;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 20px;
        }

        .stat {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            font-size: 12px;
        }

        .stat-label {
            font-size: 10px;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 700;
            margin-top: 6px;
        }

        .info-box {
            background: #f0f4ff;
            border-left: 4px solid #667eea;
            padding: 12px;
            border-radius: 4px;
            font-size: 12px;
            color: #334;
            margin-top: 20px;
        }

        .viewer {
            background: #f8f9fa;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            aspect-ratio: 1;
            min-height: 500px;
        }

        #canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .controls-hint {
            position: absolute;
            bottom: 16px;
            left: 16px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 11px;
            z-index: 10;
        }

        @media (max-width: 1024px) {
            .content {
                grid-template-columns: 1fr;
                gap: 30px;
            }

            .viewer {
                min-height: 400px;
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 24px;
            }

            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔧 Gridfinity Generator 3D</h1>
            <p class="subtitle">Design modular storage containers in 3D</p>
        </header>

        <div class="content">
            <div class="controls">
                <h2 style="margin-top: 0;">Container</h2>

                <div class="control-group">
                    <label>Width (units)</label>
                    <input type="number" id="gridWidth" min="1" max="10" value="3">
                </div>

                <div class="control-group">
                    <label>Height (units)</label>
                    <input type="number" id="gridHeight" min="1" max="10" value="3">
                </div>

                <div class="control-group">
                    <label>Depth (mm)</label>
                    <input type="number" id="depth" min="10" max="200" value="50" step="5">
                </div>

                <h2>Material</h2>

                <div class="control-group">
                    <label>Wall Thickness (mm)</label>
                    <div class="range-display">
                        <input type="range" id="wallThickness" min="0.8" max="3" value="1.2" step="0.1" style="flex: 1;">
                        <span class="range-value" id="wallDisplay">1.2mm</span>
                    </div>
                </div>

                <h2>Base Unit</h2>

                <div class="control-group">
                    <label>Unit Size (mm)</label>
                    <input type="number" id="unitSize" min="20" max="50" value="42.3" step="0.1">
                </div>

                <div class="control-group">
                    <label>Spacing (mm)</label>
                    <div class="range-display">
                        <input type="range" id="spacing" min="0" max="5" value="0" step="0.1" style="flex: 1;">
                        <span class="range-value" id="spacingDisplay">0mm</span>
                    </div>
                </div>

                <h2>Features</h2>

                <div class="control-group">
                    <label>Base Type</label>
                    <select id="baseType">
                        <option value="solid">Solid Base</option>
                        <option value="feet">Feet</option>
                        <option value="grid">Grid Base</option>
                    </select>
                </div>

                <div class="control-group">
                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; text-transform: none;">
                        <input type="checkbox" id="showGrid" checked style="width: auto;">
                        Show Grid Lines
                    </label>
                </div>

                <div class="control-group">
                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; text-transform: none;">
                        <input type="checkbox" id="enableRotation" checked style="width: auto;">
                        Auto Rotation
                    </label>
                </div>

                <div class="buttons">
                    <button class="btn-primary" onclick="exportSTL()">📥 Export STL</button>
                    <button class="btn-secondary" onclick="resetForm()">↻ Reset</button>
                </div>

                <div class="stats">
                    <div class="stat">
                        <div class="stat-label">Width</div>
                        <div class="stat-value" id="statWidth">127mm</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">Depth</div>
                        <div class="stat-value" id="statDepth">50mm</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">Height</div>
                        <div class="stat-value" id="statHeight">127mm</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">Cells</div>
                        <div class="stat-value" id="statCells">9</div>
                    </div>
                </div>

                <div class="info-box">
                    <strong>💡 Tip:</strong> Drag to rotate • Scroll to zoom • Standard units: 42.3mm
                </div>
            </div>

            <div class="viewer" id="viewer">
                <canvas id="canvas"></canvas>
                <div class="controls-hint">Drag to rotate • Scroll to zoom</div>
            </div>
        </div>
    </div>

    <script>
        // Three.js setup
        let scene, camera, renderer, container3D, gridLines;
        let autoRotate = true;

        function initThree() {
            const canvas = document.getElementById('canvas');
            const viewer = document.getElementById('viewer');

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xf8f9fa);

            camera = new THREE.PerspectiveCamera(75, viewer.clientWidth / viewer.clientHeight, 0.1, 1000);
            camera.position.set(150, 150, 150);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
            renderer.setSize(viewer.clientWidth, viewer.clientHeight);
            renderer.setPixelRatio(window.devicePixelRatio);

            // Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(100, 100, 100);
            scene.add(directionalLight);

            // Grid
            const gridHelper = new THREE.GridHelper(300, 30, 0xdddddd, 0xeeeeee);
            scene.add(gridHelper);

            // Container for the model
            container3D = new THREE.Group();
            scene.add(container3D);

            // Mouse controls
            let isDragging = false;
            let previousMousePosition = { x: 0, y: 0 };

            canvas.addEventListener('mousedown', (e) => {
                isDragging = true;
                previousMousePosition = { x: e.clientX, y: e.clientY };
            });

            canvas.addEventListener('mousemove', (e) => {
                if (isDragging) {
                    const deltaX = e.clientX - previousMousePosition.x;
                    const deltaY = e.clientY - previousMousePosition.y;

                    container3D.rotation.y += deltaX * 0.01;
                    container3D.rotation.x += deltaY * 0.01;
                    
                    autoRotate = false;
                }
                previousMousePosition = { x: e.clientX, y: e.clientY };
            });

            canvas.addEventListener('mouseup', () => {
                isDragging = false;
            });

            canvas.addEventListener('wheel', (e) => {
                e.preventDefault();
                camera.position.multiplyScalar(1 + e.deltaY * 0.001);
            }, { passive: false });

            window.addEventListener('resize', () => {
                const width = viewer.clientWidth;
                const height = viewer.clientHeight;
                camera.aspect = width / height;
                camera.updateProjectionMatrix();
                renderer.setSize(width, height);
            });

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);

            if (autoRotate && document.getElementById('enableRotation').checked) {
                container3D.rotation.y += 0.002;
            }

            renderer.render(scene, camera);
        }

        function createContainer() {
            // Clear previous container
            while (container3D.children.length > 0) {
                container3D.removeChild(container3D.children[0]);
            }

            const width = parseInt(document.getElementById('gridWidth').value) || 1;
            const height = parseInt(document.getElementById('gridHeight').value) || 1;
            const depth = parseFloat(document.getElementById('depth').value) || 50;
            const wallThickness = parseFloat(document.getElementById('wallThickness').value) || 1.2;
            const unitSize = parseFloat(document.getElementById('unitSize').value) || 42.3;
            const spacing = parseFloat(document.getElementById('spacing').value) || 0;
            const baseType = document.getElementById('baseType').value;
            const showGrid = document.getElementById('showGrid').checked;

            const containerWidth = width * unitSize + (width - 1) * spacing;
            const containerHeight = height * unitSize + (height - 1) * spacing;
            const totalWidth = containerWidth + 2 * wallThickness;
            const totalHeight = containerHeight + 2 * wallThickness;

            // Outer box (walls)
            const outerGeometry = new THREE.BoxGeometry(totalWidth, totalHeight, depth);
            const outerMaterial = new THREE.MeshPhongMaterial({ 
                color: 0x667eea,
                emissive: 0x2a2a4a,
                shininess: 30
            });
            const outerBox = new THREE.Mesh(outerGeometry, outerMaterial);
            outerBox.position.z = depth / 2;
            outerBox.castShadow = true;
            outerBox.receiveShadow = true;
            container3D.add(outerBox);

            // Inner cavity
            const innerGeometry = new THREE.BoxGeometry(containerWidth, containerHeight, depth + 1);
            const innerMaterial = new THREE.MeshPhongMaterial({ 
                color: 0xf0f0f0,
                emissive: 0x999999,
                shininess: 20
            });
            const innerBox = new THREE.Mesh(innerGeometry, innerMaterial);
            innerBox.position.z = depth / 2 - 0.5;
            container3D.add(innerBox);

            // Grid visualization
            if (showGrid) {
                for (let x = 0; x <= width; x++) {
                    const line = new THREE.BufferGeometry();
                    const points = [
                        new THREE.Vector3(-containerWidth / 2 + x * unitSize, -containerHeight / 2, depth),
                        new THREE.Vector3(-containerWidth / 2 + x * unitSize, containerHeight / 2, depth)
                    ];
                    line.setFromPoints(points);
                    const lineMaterial = new THREE.LineBasicMaterial({ color: 0xdddddd, linewidth: 1 });
                    const lineObj = new THREE.Line(line, lineMaterial);
                    container3D.add(lineObj);
                }

                for (let y = 0; y <= height; y++) {
                    const line = new THREE.BufferGeometry();
                    const points = [
                        new THREE.Vector3(-containerWidth / 2, -containerHeight / 2 + y * unitSize, depth),
                        new THREE.Vector3(containerWidth / 2, -containerHeight / 2 + y * unitSize, depth)
                    ];
                    line.setFromPoints(points);
                    const lineMaterial = new THREE.LineBasicMaterial({ color: 0xdddddd, linewidth: 1 });
                    const lineObj = new THREE.Line(line, lineMaterial);
                    container3D.add(lineObj);
                }
            }

            // Base
            if (baseType === 'feet') {
                const footGeometry = new THREE.CylinderGeometry(4, 4, 8, 16);
                const footMaterial = new THREE.MeshPhongMaterial({ color: 0x667eea });
                const positions = [
                    [-totalWidth / 2 + 10, -totalHeight / 2 + 10, 0],
                    [totalWidth / 2 - 10, -totalHeight / 2 + 10, 0],
                    [-totalWidth / 2 + 10, totalHeight / 2 - 10, 0],
                    [totalWidth / 2 - 10, totalHeight / 2 - 10, 0]
                ];
                positions.forEach(pos => {
                    const foot = new THREE.Mesh(footGeometry, footMaterial);
                    foot.position.set(...pos);
                    container3D.add(foot);
                });
            } else if (baseType === 'grid') {
                const barGeometry = new THREE.BoxGeometry(totalWidth - 20, 3, 3);
                const barMaterial = new THREE.MeshPhongMaterial({ color: 0x667eea });
                const bar1 = new THREE.Mesh(barGeometry, barMaterial);
                bar1.position.set(0, -(totalHeight - 20) / 2, -2);
                container3D.add(bar1);

                const bar2 = new THREE.Mesh(barGeometry, barMaterial);
                bar2.position.set(0, (totalHeight - 20) / 2, -2);
                container3D.add(bar2);
            }

            // Update stats
            document.getElementById('statWidth').textContent = Math.round(totalWidth) + 'mm';
            document.getElementById('statHeight').textContent = Math.round(totalHeight) + 'mm';
            document.getElementById('statDepth').textContent = Math.round(depth) + 'mm';
            document.getElementById('statCells').textContent = width * height;
        }

        function resetForm() {
            document.getElementById('gridWidth').value = 3;
            document.getElementById('gridHeight').value = 3;
            document.getElementById('depth').value = 50;
            document.getElementById('wallThickness').value = 1.2;
            document.getElementById('unitSize').value = 42.3;
            document.getElementById('spacing').value = 0;
            document.getElementById('baseType').value = 'solid';
            document.getElementById('showGrid').checked = true;
            document.getElementById('enableRotation').checked = true;
            autoRotate = true;
            updateDisplay();
            createContainer();
        }

        function updateDisplay() {
            document.getElementById('wallDisplay').textContent = document.getElementById('wallThickness').value + 'mm';
            document.getElementById('spacingDisplay').textContent = document.getElementById('spacing').value + 'mm';
            createContainer();
        }

        function exportSTL() {
            const width = parseInt(document.getElementById('gridWidth').value);
            const height = parseInt(document.getElementById('gridHeight').value);
            const depth = parseFloat(document.getElementById('depth').value);
            const wallThickness = parseFloat(document.getElementById('wallThickness').value);
            const unitSize = parseFloat(document.getElementById('unitSize').value);
            const spacing = parseFloat(document.getElementById('spacing').value);

            const containerWidth = width * unitSize + (width - 1) * spacing;
            const containerHeight = height * unitSize + (height - 1) * spacing;
            const totalWidth = containerWidth + 2 * wallThickness;
            const totalHeight = containerHeight + 2 * wallThickness;

            const stl = generateSTL(totalWidth, totalHeight, depth, wallThickness, width, height, unitSize, spacing);
            
            const blob = new Blob([stl], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `gridfinity-${width}x${height}x${Math.round(depth)}.stl`;
            link.click();
            URL.revokeObjectURL(url);
        }

        function generateSTL(width, height, depth, wallThickness, gridW, gridH, unitSize, spacing) {
            let stl = 'solid gridfinity_container\n';
            
            const vertices = [
                [0, 0, 0], [width, 0, 0], [width, height, 0], [0, height, 0],
                [0, 0, depth], [width, 0, depth], [width, height, depth], [0, height, depth]
            ];

            const faces = [
                [0, 1, 2], [0, 2, 3],
                [4, 6, 5], [4, 7, 6],
                [0, 4, 5], [0, 5, 1],
                [2, 6, 7], [2, 7, 3],
                [0, 3, 7], [0, 7, 4],
                [1, 5, 6], [1, 6, 2]
            ];

            faces.forEach(face => {
                const v0 = vertices[face[0]];
                const v1 = vertices[face[1]];
                const v2 = vertices[face[2]];

                const edge1 = [v1[0] - v0[0], v1[1] - v0[1], v1[2] - v0[2]];
                const edge2 = [v2[0] - v0[0], v2[1] - v0[1], v2[2] - v0[2]];
                const normal = [
                    edge1[1] * edge2[2] - edge1[2] * edge2[1],
                    edge1[2] * edge2[0] - edge1[0] * edge2[2],
                    edge1[0] * edge2[1] - edge1[1] * edge2[0]
                ];

                const len = Math.sqrt(normal[0]*normal[0] + normal[1]*normal[1] + normal[2]*normal[2]);
                const nx = normal[0] / len;
                const ny = normal[1] / len;
                const nz = normal[2] / len;

                stl += `  facet normal ${nx.toFixed(6)} ${ny.toFixed(6)} ${nz.toFixed(6)}\n`;
                stl += `    outer loop\n`;
                stl += `      vertex ${v0[0].toFixed(3)} ${v0[1].toFixed(3)} ${v0[2].toFixed(3)}\n`;
                stl += `      vertex ${v1[0].toFixed(3)} ${v1[1].toFixed(3)} ${v1[2].toFixed(3)}\n`;
                stl += `      vertex ${v2[0].toFixed(3)} ${v2[1].toFixed(3)} ${v2[2].toFixed(3)}\n`;
                stl += `    endloop\n`;
                stl += `  endfacet\n`;
            });

            stl += 'endsolid gridfinity_container\n';
            return stl;
        }

        // Event listeners
        ['gridWidth', 'gridHeight', 'depth', 'wallThickness', 'unitSize', 'spacing', 'baseType', 'showGrid', 'enableRotation'].forEach(id => {
            const elem = document.getElementById(id);
            elem.addEventListener('change', updateDisplay);
            elem.addEventListener('input', updateDisplay);
        });

        // Initialize
        initThree();
        createContainer();
    </script>
</body>
</html>
