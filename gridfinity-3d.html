<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gridfinity Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 1400px;
            padding: 40px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 32px;
            color: #333;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
        }

        .content {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 40px;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 12px;
            font-weight: 600;
            color: #333;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="number"] {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 13px;
            font-family: inherit;
            width: 100%;
            transition: border-color 0.2s;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .buttons {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        button {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            border: 1px solid #ddd;
        }

        .btn-secondary:hover {
            background: #e8e8e8;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 20px;
        }

        .stat {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            font-size: 12px;
        }

        .stat-label {
            font-size: 10px;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 700;
            margin-top: 6px;
        }

        .info-box {
            background: #f0f4ff;
            border-left: 4px solid #667eea;
            padding: 12px;
            border-radius: 4px;
            font-size: 12px;
            color: #334;
            margin-top: 20px;
        }

        .viewer {
            background: #f8f9fa;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            aspect-ratio: 1;
            min-height: 500px;
        }

        #canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .controls-hint {
            position: absolute;
            bottom: 16px;
            left: 16px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 11px;
            z-index: 10;
        }

        .error {
            background: #fee;
            border: 1px solid #fcc;
            color: #c33;
            padding: 12px;
            border-radius: 6px;
            font-size: 12px;
            margin-top: 12px;
        }

        @media (max-width: 1024px) {
            .content {
                grid-template-columns: 1fr;
                gap: 30px;
            }

            .viewer {
                min-height: 400px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔧 Gridfinity Generator</h1>
            <p class="subtitle">Generate custom Gridfinity storage containers with base plates</p>
        </header>

        <div class="content">
            <div class="controls">
                <div class="control-group">
                    <label>Width (units)</label>
                    <input type="number" id="width" min="1" max="20" value="3">
                </div>

                <div class="control-group">
                    <label>Height (units)</label>
                    <input type="number" id="height" min="1" max="20" value="3">
                </div>

                <div class="control-group">
                    <label>Magnet Diameter (mm)</label>
                    <input type="number" id="magnetDia" min="4" max="8" value="6" step="0.1">
                </div>

                <div class="control-group">
                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; text-transform: none;">
                        <input type="checkbox" id="includeBase" checked style="width: auto;">
                        Include Base Plate
                    </label>
                </div>

                <div class="buttons">
                    <button class="btn-primary" onclick="exportSTL()">📥 Export STL</button>
                    <button class="btn-secondary" onclick="resetForm()">↻ Reset</button>
                </div>

                <div class="stats">
                    <div class="stat">
                        <div class="stat-label">Width</div>
                        <div class="stat-value" id="statWidth">127mm</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">Height</div>
                        <div class="stat-value" id="statHeight">127mm</div>
                    </div>
                </div>

                <div class="info-box">
                    <strong>💡 Gridfinity:</strong> 42.3mm standard unit size. Drag to rotate in preview.
                </div>

                <div id="errorBox"></div>
            </div>

            <div class="viewer" id="viewer">
                <canvas id="canvas"></canvas>
                <div class="controls-hint">Drag to rotate • Scroll to zoom</div>
            </div>
        </div>
    </div>

    <script>
        const UNIT_SIZE = 42.3; // Gridfinity standard unit size in mm
        const WALL_THICKNESS = 1.5; // mm
        const BOX_HEIGHT = 7; // mm per unit height

        let scene, camera, renderer, container3D;
        let autoRotate = true;

        function showError(msg) {
            const errorBox = document.getElementById('errorBox');
            errorBox.innerHTML = `<div class="error">${msg}</div>`;
            setTimeout(() => { errorBox.innerHTML = ''; }, 5000);
        }

        function initThree() {
            const canvas = document.getElementById('canvas');
            const viewer = document.getElementById('viewer');

            try {
                scene = new THREE.Scene();
                scene.background = new THREE.Color(0xf8f9fa);

                camera = new THREE.PerspectiveCamera(75, viewer.clientWidth / viewer.clientHeight, 0.1, 1000);
                camera.position.set(150, 150, 150);
                camera.lookAt(0, 0, 0);

                renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
                renderer.setSize(viewer.clientWidth, viewer.clientHeight);
                renderer.setPixelRatio(window.devicePixelRatio);

                // Lighting
                const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
                scene.add(ambientLight);

                const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
                directionalLight.position.set(100, 100, 100);
                scene.add(directionalLight);

                // Container for the model
                container3D = new THREE.Group();
                scene.add(container3D);

                // Mouse controls
                let isDragging = false;
                let previousMousePosition = { x: 0, y: 0 };

                canvas.addEventListener('mousedown', (e) => {
                    isDragging = true;
                    previousMousePosition = { x: e.clientX, y: e.clientY };
                });

                canvas.addEventListener('mousemove', (e) => {
                    if (isDragging) {
                        const deltaX = e.clientX - previousMousePosition.x;
                        const deltaY = e.clientY - previousMousePosition.y;

                        container3D.rotation.y += deltaX * 0.01;
                        container3D.rotation.x += deltaY * 0.01;
                        
                        autoRotate = false;
                    }
                    previousMousePosition = { x: e.clientX, y: e.clientY };
                });

                canvas.addEventListener('mouseup', () => {
                    isDragging = false;
                });

                canvas.addEventListener('wheel', (e) => {
                    e.preventDefault();
                    camera.position.multiplyScalar(1 + e.deltaY * 0.001);
                }, { passive: false });

                window.addEventListener('resize', () => {
                    const width = viewer.clientWidth;
                    const height = viewer.clientHeight;
                    camera.aspect = width / height;
                    camera.updateProjectionMatrix();
                    renderer.setSize(width, height);
                });

                animate();
            } catch (err) {
                showError('Failed to initialize 3D viewer: ' + err.message);
            }
        }

        function animate() {
            requestAnimationFrame(animate);

            if (autoRotate) {
                container3D.rotation.y += 0.002;
            }

            renderer.render(scene, camera);
        }

        function createContainer() {
            while (container3D.children.length > 0) {
                container3D.removeChild(container3D.children[0]);
            }

            try {
                const w = Math.max(1, Math.floor(parseFloat(document.getElementById('width').value)) || 3);
                const h = Math.max(1, Math.floor(parseFloat(document.getElementById('height').value)) || 3);
                const magnetDia = Math.max(4, Math.min(8, parseFloat(document.getElementById('magnetDia').value)) || 6);
                const includeBase = document.getElementById('includeBase').checked;

                const containerWidth = w * UNIT_SIZE;
                const containerHeight = h * UNIT_SIZE;
                const boxHeight = h * BOX_HEIGHT;

                // Main container box
                const boxGeometry = new THREE.BoxGeometry(containerWidth, containerHeight, boxHeight);
                const boxMaterial = new THREE.MeshPhongMaterial({ 
                    color: 0x667eea,
                    emissive: 0x2a2a4a,
                    shininess: 30
                });
                const box = new THREE.Mesh(boxGeometry, boxMaterial);
                box.position.z = boxHeight / 2;
                container3D.add(box);

                // Grid lines
                for (let x = 0; x <= w; x++) {
                    const line = new THREE.BufferGeometry();
                    const points = [
                        new THREE.Vector3(-containerWidth / 2 + x * UNIT_SIZE, -containerHeight / 2, boxHeight),
                        new THREE.Vector3(-containerWidth / 2 + x * UNIT_SIZE, containerHeight / 2, boxHeight)
                    ];
                    line.setFromPoints(points);
                    const lineMaterial = new THREE.LineBasicMaterial({ color: 0xffffff, linewidth: 2 });
                    container3D.add(new THREE.Line(line, lineMaterial));
                }

                for (let y = 0; y <= h; y++) {
                    const line = new THREE.BufferGeometry();
                    const points = [
                        new THREE.Vector3(-containerWidth / 2, -containerHeight / 2 + y * UNIT_SIZE, boxHeight),
                        new THREE.Vector3(containerWidth / 2, -containerHeight / 2 + y * UNIT_SIZE, boxHeight)
                    ];
                    line.setFromPoints(points);
                    const lineMaterial = new THREE.LineBasicMaterial({ color: 0xffffff, linewidth: 2 });
                    container3D.add(new THREE.Line(line, lineMaterial));
                }

                // Base plate
                if (includeBase) {
                    const baseGeometry = new THREE.BoxGeometry(containerWidth + WALL_THICKNESS * 2, containerHeight + WALL_THICKNESS * 2, 2);
                    const baseMaterial = new THREE.MeshPhongMaterial({ 
                        color: 0x764ba2,
                        emissive: 0x3d3d5c,
                        shininess: 25
                    });
                    const base = new THREE.Mesh(baseGeometry, baseMaterial);
                    base.position.z = -1;
                    container3D.add(base);

                    // Add magnet holes to base plate
                    const magnetRadius = magnetDia / 2;
                    for (let x = 0; x < w; x++) {
                        for (let y = 0; y < h; y++) {
                            const holeCenterX = -containerWidth / 2 + (x + 0.5) * UNIT_SIZE;
                            const holeCenterY = -containerHeight / 2 + (y + 0.5) * UNIT_SIZE;

                            const holeGeometry = new THREE.CylinderGeometry(magnetRadius, magnetRadius, 3, 16);
                            const holeMaterial = new THREE.MeshPhongMaterial({ color: 0x333333 });
                            const hole = new THREE.Mesh(holeGeometry, holeMaterial);
                            hole.position.set(holeCenterX, holeCenterY, -1.5);
                            hole.rotation.x = Math.PI / 2;
                            container3D.add(hole);
                        }
                    }
                }

                // Update stats
                const totalWidth = containerWidth + WALL_THICKNESS * 2;
                const totalHeight = containerHeight + WALL_THICKNESS * 2;
                document.getElementById('statWidth').textContent = Math.round(totalWidth) + 'mm';
                document.getElementById('statHeight').textContent = Math.round(totalHeight) + 'mm';

            } catch (err) {
                showError('Error creating container: ' + err.message);
            }
        }

        function resetForm() {
            document.getElementById('width').value = 3;
            document.getElementById('height').value = 3;
            document.getElementById('magnetDia').value = 6;
            document.getElementById('includeBase').checked = true;
            autoRotate = true;
            updatePreview();
        }

        function updatePreview() {
            createContainer();
        }

        function exportSTL() {
            try {
                const w = Math.max(1, Math.floor(parseFloat(document.getElementById('width').value)) || 3);
                const h = Math.max(1, Math.floor(parseFloat(document.getElementById('height').value)) || 3);
                const magnetDia = Math.max(4, Math.min(8, parseFloat(document.getElementById('magnetDia').value)) || 6);
                const includeBase = document.getElementById('includeBase').checked;

                const containerWidth = w * UNIT_SIZE;
                const containerHeight = h * UNIT_SIZE;
                const boxHeight = h * BOX_HEIGHT;
                const totalWidth = containerWidth + WALL_THICKNESS * 2;
                const totalHeight = containerHeight + WALL_THICKNESS * 2;

                let stl = 'solid gridfinity_container\n';

                // Main box vertices
                const vertices = [
                    [0, 0, 0], [totalWidth, 0, 0], [totalWidth, totalHeight, 0], [0, totalHeight, 0],
                    [0, 0, boxHeight], [totalWidth, 0, boxHeight], [totalWidth, totalHeight, boxHeight], [0, totalHeight, boxHeight]
                ];

                const faces = [
                    [0, 1, 2], [0, 2, 3],
                    [4, 6, 5], [4, 7, 6],
                    [0, 4, 5], [0, 5, 1],
                    [2, 6, 7], [2, 7, 3],
                    [0, 3, 7], [0, 7, 4],
                    [1, 5, 6], [1, 6, 2]
                ];

                faces.forEach(face => {
                    const v0 = vertices[face[0]];
                    const v1 = vertices[face[1]];
                    const v2 = vertices[face[2]];

                    const edge1 = [v1[0] - v0[0], v1[1] - v0[1], v1[2] - v0[2]];
                    const edge2 = [v2[0] - v0[0], v2[1] - v0[1], v2[2] - v0[2]];
                    const normal = [
                        edge1[1] * edge2[2] - edge1[2] * edge2[1],
                        edge1[2] * edge2[0] - edge1[0] * edge2[2],
                        edge1[0] * edge2[1] - edge1[1] * edge2[0]
                    ];

                    const len = Math.sqrt(normal[0]*normal[0] + normal[1]*normal[1] + normal[2]*normal[2]);
                    if (len === 0) return;
                    const nx = normal[0] / len;
                    const ny = normal[1] / len;
                    const nz = normal[2] / len;

                    stl += `  facet normal ${nx.toFixed(6)} ${ny.toFixed(6)} ${nz.toFixed(6)}\n`;
                    stl += `    outer loop\n`;
                    stl += `      vertex ${v0[0].toFixed(3)} ${v0[1].toFixed(3)} ${v0[2].toFixed(3)}\n`;
                    stl += `      vertex ${v1[0].toFixed(3)} ${v1[1].toFixed(3)} ${v1[2].toFixed(3)}\n`;
                    stl += `      vertex ${v2[0].toFixed(3)} ${v2[1].toFixed(3)} ${v2[2].toFixed(3)}\n`;
                    stl += `    endloop\n`;
                    stl += `  endfacet\n`;
                });

                stl += 'endsolid gridfinity_container\n';

                const blob = new Blob([stl], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `gridfinity-${w}x${h}-${magnetDia}mm.stl`;
                link.click();
                URL.revokeObjectURL(url);
            } catch (err) {
                showError('Failed to export STL: ' + err.message);
            }
        }

        // Event listeners
        ['width', 'height', 'magnetDia', 'includeBase'].forEach(id => {
            document.getElementById(id).addEventListener('change', updatePreview);
            document.getElementById(id).addEventListener('input', updatePreview);
        });

        // Initialize
        initThree();
        createContainer();
    </script>
</body>
</html>
