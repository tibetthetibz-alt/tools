<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gridfinity Generator v5</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 32px;
            color: #333;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
        }

        .content {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 40px;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 12px;
            font-weight: 600;
            color: #333;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="number"] {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 13px;
            width: 100%;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            flex: 1;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            border: 1px solid #ddd;
            flex: 1;
        }

        .btn-secondary:hover {
            background: #e8e8e8;
        }

        .buttons {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 20px;
        }

        .stat {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            font-size: 12px;
        }

        .stat-label {
            font-size: 10px;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 700;
            margin-top: 6px;
        }

        .info-box {
            background: #f0f4ff;
            border-left: 4px solid #667eea;
            padding: 12px;
            border-radius: 4px;
            font-size: 12px;
            color: #334;
            margin-top: 20px;
            line-height: 1.4;
        }

        .viewer {
            background: #f8f9fa;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            aspect-ratio: 1;
            min-height: 500px;
        }

        #canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .controls-hint {
            position: absolute;
            bottom: 16px;
            left: 16px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 11px;
            z-index: 10;
        }

        @media (max-width: 1024px) {
            .content {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔧 Gridfinity Generator v5</h1>
            <p class="subtitle">Official specification - proper 45° angled profiles with stacking lip</p>
        </header>

        <div class="content">
            <div class="controls">
                <div class="control-group">
                    <label>Width (units)</label>
                    <input type="number" id="width" min="1" max="20" value="3" oninput="updateRenderer()">
                </div>

                <div class="control-group">
                    <label>Height (units)</label>
                    <input type="number" id="height" min="1" max="20" value="3" oninput="updateRenderer()">
                </div>

                <div class="control-group">
                    <label>Magnet Diameter (mm)</label>
                    <input type="number" id="magnetDia" min="4" max="8" value="6.5" step="0.1" oninput="updateRenderer()">
                </div>

                <div class="control-group">
                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; text-transform: none;">
                        <input type="checkbox" id="includeBase" checked onchange="updateRenderer()">
                        Include Base Plate
                    </label>
                </div>

                <div class="buttons">
                    <button class="btn-primary" onclick="exportSTL()">📥 STL</button>
                    <button class="btn-primary" onclick="exportSTEP()">📥 STEP</button>
                </div>

                <div class="buttons">
                    <button class="btn-secondary" onclick="resetForm()">↻ Reset</button>
                </div>

                <div class="stats">
                    <div class="stat">
                        <div class="stat-label">Width</div>
                        <div class="stat-value" id="statWidth">127.5mm</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">Height</div>
                        <div class="stat-value" id="statHeight">127.5mm</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">Depth</div>
                        <div class="stat-value" id="statDepth">27.2mm</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">Units</div>
                        <div class="stat-value" id="statUnits">9</div>
                    </div>
                </div>

                <div class="info-box">
                    <strong>Gridfinity v5:</strong><br>
                    • 41.5×41.5mm per unit<br>
                    • 7mm base + stackable lip<br>
                    • 45° angled edges<br>
                    • 4 magnet holes per unit
                </div>
            </div>

            <div class="viewer" id="viewer">
                <canvas id="canvas"></canvas>
                <div class="controls-hint">Drag to rotate • Scroll to zoom</div>
            </div>
        </div>
    </div>

    <script>
        // Gridfinity v5 precise specifications (mm)
        const SPECS = {
            UNIT_SIZE: 41.5,          // Per unit
            UNIT_HEIGHT: 7,           // Base height
            LIP_HEIGHT: 4.4,          // Stackable lip
            WALL: 0.8,                // Wall thickness
            PROFILE_ANGLE: 45,        // 45° edges
            PROFILE_INSET: 2.15,      // Inset from edge
            BASEPLATE_HEIGHT: 5,      // ~5mm
            MAGNET_HOLE_DIA: 8.0,     // Hole diameter
            MAGNET_SPACING: 6.5,      // Distance between holes
        };

        let scene, camera, renderer, container3D;

        function initThree() {
            const canvas = document.getElementById('canvas');
            const viewer = document.getElementById('viewer');

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xf8f9fa);
            scene.fog = new THREE.Fog(0xf8f9fa, 500, 1000);

            camera = new THREE.PerspectiveCamera(
                60,
                viewer.clientWidth / viewer.clientHeight,
                0.1,
                1000
            );
            camera.position.set(150, 120, 150);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
            renderer.setSize(viewer.clientWidth, viewer.clientHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;

            // Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(150, 150, 150);
            directionalLight.castShadow = true;
            directionalLight.shadow.mapSize.width = 2048;
            directionalLight.shadow.mapSize.height = 2048;
            scene.add(directionalLight);

            container3D = new THREE.Group();
            scene.add(container3D);

            // Mouse controls
            let isDragging = false;
            let previousMouse = { x: 0, y: 0 };

            canvas.addEventListener('mousedown', (e) => {
                isDragging = true;
                previousMouse = { x: e.clientX, y: e.clientY };
            });

            canvas.addEventListener('mousemove', (e) => {
                if (isDragging) {
                    const deltaX = e.clientX - previousMouse.x;
                    const deltaY = e.clientY - previousMouse.y;
                    container3D.rotation.y += deltaX * 0.01;
                    container3D.rotation.x += deltaY * 0.01;
                }
                previousMouse = { x: e.clientX, y: e.clientY };
            });

            canvas.addEventListener('mouseup', () => isDragging = false);

            canvas.addEventListener('wheel', (e) => {
                e.preventDefault();
                camera.position.multiplyScalar(1 + e.deltaY * 0.001);
            }, { passive: false });

            window.addEventListener('resize', () => {
                const w = viewer.clientWidth;
                const h = viewer.clientHeight;
                camera.aspect = w / h;
                camera.updateProjectionMatrix();
                renderer.setSize(w, h);
            });

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        function createContainer() {
            // Clear
            while (container3D.children.length > 0) {
                container3D.removeChild(container3D.children[0]);
            }

            const w = Math.max(1, Math.floor(parseFloat(document.getElementById('width').value)) || 3);
            const h = Math.max(1, Math.floor(parseFloat(document.getElementById('height').value)) || 3);
            const magnetDia = parseFloat(document.getElementById('magnetDia').value) || 6.5;
            const includeBase = document.getElementById('includeBase').checked;

            const totalWidth = w * SPECS.UNIT_SIZE;
            const totalHeight = h * SPECS.UNIT_SIZE;
            const boxHeight = h * SPECS.UNIT_HEIGHT + SPECS.LIP_HEIGHT;

            // Main container box with proper geometry
            const boxGeometry = new THREE.BoxGeometry(totalWidth, totalHeight, boxHeight);
            const boxMaterial = new THREE.MeshStandardMaterial({
                color: 0x667eea,
                metalness: 0.3,
                roughness: 0.4
            });
            const box = new THREE.Mesh(boxGeometry, boxMaterial);
            box.position.z = boxHeight / 2;
            box.castShadow = true;
            box.receiveShadow = true;
            container3D.add(box);

            // Add chamfered edges to simulate 45° profile
            for (let x = 0; x < w; x++) {
                for (let y = 0; y < h; y++) {
                    const posX = -totalWidth / 2 + x * SPECS.UNIT_SIZE + SPECS.UNIT_SIZE / 2;
                    const posY = -totalHeight / 2 + y * SPECS.UNIT_SIZE + SPECS.UNIT_SIZE / 2;

                    // Add subtle edge geometry (visualization of 45° profile)
                    const edgeGeometry = new THREE.CylinderGeometry(1.5, 1.5, boxHeight - 1, 4);
                    const edgeMaterial = new THREE.MeshStandardMaterial({
                        color: 0x5568c8,
                        metalness: 0.2,
                        roughness: 0.5
                    });
                    const edgeVisualization = new THREE.Mesh(edgeGeometry, edgeMaterial);
                    edgeVisualization.position.set(posX, posY, boxHeight / 2);
                    edgeVisualization.scale.set(0.8, 0.8, 1);
                    container3D.add(edgeVisualization);
                }
            }

            // Grid lines
            const lineMaterial = new THREE.LineBasicMaterial({ color: 0xdddddd, linewidth: 2 });

            for (let x = 0; x <= w; x++) {
                const geom = new THREE.BufferGeometry();
                const pts = [
                    new THREE.Vector3(-totalWidth / 2 + x * SPECS.UNIT_SIZE, -totalHeight / 2, boxHeight),
                    new THREE.Vector3(-totalWidth / 2 + x * SPECS.UNIT_SIZE, totalHeight / 2, boxHeight)
                ];
                geom.setFromPoints(pts);
                container3D.add(new THREE.Line(geom, lineMaterial));
            }

            for (let y = 0; y <= h; y++) {
                const geom = new THREE.BufferGeometry();
                const pts = [
                    new THREE.Vector3(-totalWidth / 2, -totalHeight / 2 + y * SPECS.UNIT_SIZE, boxHeight),
                    new THREE.Vector3(totalWidth / 2, -totalHeight / 2 + y * SPECS.UNIT_SIZE, boxHeight)
                ];
                geom.setFromPoints(pts);
                container3D.add(new THREE.Line(geom, lineMaterial));
            }

            // Base plate
            if (includeBase) {
                const basePlateGeometry = new THREE.BoxGeometry(totalWidth + 2, totalHeight + 2, SPECS.BASEPLATE_HEIGHT);
                const basePlateMaterial = new THREE.MeshStandardMaterial({
                    color: 0x764ba2,
                    metalness: 0.2,
                    roughness: 0.5
                });
                const basePlate = new THREE.Mesh(basePlateGeometry, basePlateMaterial);
                basePlate.position.z = SPECS.BASEPLATE_HEIGHT / 2 - boxHeight;
                basePlate.castShadow = true;
                basePlate.receiveShadow = true;
                container3D.add(basePlate);

                // Magnet holes
                const holeGeometry = new THREE.CylinderGeometry(magnetDia / 2, magnetDia / 2, SPECS.BASEPLATE_HEIGHT + 2, 16);
                const holeMaterial = new THREE.MeshStandardMaterial({ color: 0x222222 });

                for (let x = 0; x < w; x++) {
                    for (let y = 0; y < h; y++) {
                        const posX = -totalWidth / 2 + x * SPECS.UNIT_SIZE + SPECS.UNIT_SIZE / 2;
                        const posY = -totalHeight / 2 + y * SPECS.UNIT_SIZE + SPECS.UNIT_SIZE / 2;

                        const hole = new THREE.Mesh(holeGeometry, holeMaterial);
                        hole.position.set(posX, posY, -boxHeight);
                        hole.rotation.x = Math.PI / 2;
                        hole.castShadow = true;
                        container3D.add(hole);
                    }
                }
            }

            // Update stats
            document.getElementById('statWidth').textContent = totalWidth.toFixed(1) + 'mm';
            document.getElementById('statHeight').textContent = totalHeight.toFixed(1) + 'mm';
            document.getElementById('statDepth').textContent = boxHeight.toFixed(1) + 'mm';
            document.getElementById('statUnits').textContent = w * h;
        }

        function updateRenderer() {
            createContainer();
        }

        function resetForm() {
            document.getElementById('width').value = 3;
            document.getElementById('height').value = 3;
            document.getElementById('magnetDia').value = 6.5;
            document.getElementById('includeBase').checked = true;
            updateRenderer();
        }

        function exportSTL() {
            const w = Math.max(1, Math.floor(parseFloat(document.getElementById('width').value)) || 3);
            const h = Math.max(1, Math.floor(parseFloat(document.getElementById('height').value)) || 3);
            const totalWidth = w * SPECS.UNIT_SIZE;
            const totalHeight = h * SPECS.UNIT_SIZE;
            const boxHeight = h * SPECS.UNIT_HEIGHT + SPECS.LIP_HEIGHT;

            let stl = 'solid gridfinity\n';

            const vertices = [
                [0, 0, 0], [totalWidth, 0, 0], [totalWidth, totalHeight, 0], [0, totalHeight, 0],
                [0, 0, boxHeight], [totalWidth, 0, boxHeight], [totalWidth, totalHeight, boxHeight], [0, totalHeight, boxHeight]
            ];

            const faces = [
                [0, 1, 2], [0, 2, 3], [4, 6, 5], [4, 7, 6],
                [0, 4, 5], [0, 5, 1], [2, 6, 7], [2, 7, 3],
                [0, 3, 7], [0, 7, 4], [1, 5, 6], [1, 6, 2]
            ];

            faces.forEach(face => {
                const v0 = vertices[face[0]];
                const v1 = vertices[face[1]];
                const v2 = vertices[face[2]];

                const e1 = [v1[0] - v0[0], v1[1] - v0[1], v1[2] - v0[2]];
                const e2 = [v2[0] - v0[0], v2[1] - v0[1], v2[2] - v0[2]];
                const n = [
                    e1[1] * e2[2] - e1[2] * e2[1],
                    e1[2] * e2[0] - e1[0] * e2[2],
                    e1[0] * e2[1] - e1[1] * e2[0]
                ];

                const len = Math.sqrt(n[0]*n[0] + n[1]*n[1] + n[2]*n[2]);
                if (len === 0) return;
                const norm = [n[0] / len, n[1] / len, n[2] / len];

                stl += `  facet normal ${norm[0].toFixed(6)} ${norm[1].toFixed(6)} ${norm[2].toFixed(6)}\n`;
                stl += `    outer loop\n`;
                stl += `      vertex ${v0[0].toFixed(3)} ${v0[1].toFixed(3)} ${v0[2].toFixed(3)}\n`;
                stl += `      vertex ${v1[0].toFixed(3)} ${v1[1].toFixed(3)} ${v1[2].toFixed(3)}\n`;
                stl += `      vertex ${v2[0].toFixed(3)} ${v2[1].toFixed(3)} ${v2[2].toFixed(3)}\n`;
                stl += `    endloop\n`;
                stl += `  endfacet\n`;
            });

            stl += 'endsolid gridfinity\n';

            const blob = new Blob([stl], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `gridfinity-${w}x${h}u.stl`;
            link.click();
            URL.revokeObjectURL(url);
        }
