<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gridfinity Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 1400px;
            padding: 40px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 32px;
            color: #333;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
        }

        .content {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 40px;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 12px;
            font-weight: 600;
            color: #333;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="number"] {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 13px;
            font-family: inherit;
            width: 100%;
            transition: border-color 0.2s;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .buttons {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        button {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            border: 1px solid #ddd;
        }

        .btn-secondary:hover {
            background: #e8e8e8;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 20px;
        }

        .stat {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            font-size: 12px;
        }

        .stat-label {
            font-size: 10px;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 700;
            margin-top: 6px;
        }

        .info-box {
            background: #f0f4ff;
            border-left: 4px solid #667eea;
            padding: 12px;
            border-radius: 4px;
            font-size: 12px;
            color: #334;
            margin-top: 20px;
            line-height: 1.4;
        }

        .viewer {
            background: #f8f9fa;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            aspect-ratio: 1;
            min-height: 500px;
        }

        #canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .controls-hint {
            position: absolute;
            bottom: 16px;
            left: 16px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 11px;
            z-index: 10;
        }

        .error {
            background: #fee;
            border: 1px solid #fcc;
            color: #c33;
            padding: 12px;
            border-radius: 6px;
            font-size: 12px;
            margin-top: 12px;
        }

        @media (max-width: 1024px) {
            .content {
                grid-template-columns: 1fr;
                gap: 30px;
            }

            .viewer {
                min-height: 400px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔧 Gridfinity Generator</h1>
            <p class="subtitle">Official v5 specification - modular storage containers</p>
        </header>

        <div class="content">
            <div class="controls">
                <div class="control-group">
                    <label>Width (units)</label>
                    <input type="number" id="width" min="1" max="20" value="3">
                </div>

                <div class="control-group">
                    <label>Height (units)</label>
                    <input type="number" id="height" min="1" max="20" value="3">
                </div>

                <div class="control-group">
                    <label>Magnet Diameter (mm)</label>
                    <input type="number" id="magnetDia" min="4" max="8" value="6.5" step="0.1">
                </div>

                <div class="control-group">
                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; text-transform: none;">
                        <input type="checkbox" id="includeBase" checked style="width: auto;">
                        Include Base Plate
                    </label>
                </div>

                <div class="buttons">
                    <button class="btn-primary" onclick="exportSTL()">📥 Export STL</button>
                    <button class="btn-secondary" onclick="resetForm()">↻ Reset</button>
                </div>

                <div class="stats">
                    <div class="stat">
                        <div class="stat-label">Width</div>
                        <div class="stat-value" id="statWidth">127.5mm</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">Height</div>
                        <div class="stat-value" id="statHeight">127.5mm</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">Depth</div>
                        <div class="stat-value" id="statDepth">21mm</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">Units</div>
                        <div class="stat-value" id="statUnits">9</div>
                    </div>
                </div>

                <div class="info-box">
                    <strong>Gridfinity v5 specs:</strong><br>
                    • Base: 41.5×41.5mm<br>
                    • Profile: 45° angles<br>
                    • Each unit: 7mm + 4.4mm lip<br>
                    • Drag to rotate • Scroll to zoom
                </div>

                <div id="errorBox"></div>
            </div>

            <div class="viewer" id="viewer">
                <canvas id="canvas"></canvas>
                <div class="controls-hint">Drag to rotate • Scroll to zoom</div>
            </div>
        </div>
    </div>

    <script>
        // Gridfinity v5 official specifications (all in mm)
        const SPECS = {
            BASE_SIZE: 41.5,        // 41.5×41.5mm base unit
            UNIT_HEIGHT: 7,         // 7mm per unit
            STACKABLE_LIP: 4.4,     // Additional lip height
            MAGNET_DIA_DEFAULT: 6.5, // Standard magnet 8.0mm diameter hole
            WALL_THICKNESS: 0.8,
            PROFILE_ANGLE: 45,      // 45° angles
            PROFILE_INSET: 2.15,    // 2.15mm inset
            BASEPLATE_HEIGHT: 5,    // ~5mm baseplate
            MAGNET_HOLE_DIA: 8.0,   // 8mm holes for magnets
            MAGNET_POCKET_DEPTH: 2.4, // Magnet pocket depth
        };

        let scene, camera, renderer, container3D;

        function showError(msg) {
            const errorBox = document.getElementById('errorBox');
            errorBox.innerHTML = `<div class="error">${msg}</div>`;
            setTimeout(() => { errorBox.innerHTML = ''; }, 5000);
        }

        function initThree() {
            const canvas = document.getElementById('canvas');
            const viewer = document.getElementById('viewer');

            try {
                scene = new THREE.Scene();
                scene.background = new THREE.Color(0xf8f9fa);

                camera = new THREE.PerspectiveCamera(75, viewer.clientWidth / viewer.clientHeight, 0.1, 1000);
                camera.position.set(100, 100, 80);
                camera.lookAt(0, 0, 0);

                renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
                renderer.setSize(viewer.clientWidth, viewer.clientHeight);
                renderer.setPixelRatio(window.devicePixelRatio);

                // Lighting
                const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
                scene.add(ambientLight);

                const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
                directionalLight.position.set(100, 100, 100);
                directionalLight.castShadow = true;
                scene.add(directionalLight);

                // Container for model
                container3D = new THREE.Group();
                scene.add(container3D);

                // Mouse controls
                let isDragging = false;
                let previousMousePosition = { x: 0, y: 0 };

                canvas.addEventListener('mousedown', (e) => {
                    isDragging = true;
                    previousMousePosition = { x: e.clientX, y: e.clientY };
                });

                canvas.addEventListener('mousemove', (e) => {
                    if (isDragging) {
                        const deltaX = e.clientX - previousMousePosition.x;
                        const deltaY = e.clientY - previousMousePosition.y;
                        container3D.rotation.y += deltaX * 0.01;
                        container3D.rotation.x += deltaY * 0.01;
                    }
                    previousMousePosition = { x: e.clientX, y: e.clientY };
                });

                canvas.addEventListener('mouseup', () => {
                    isDragging = false;
                });

                canvas.addEventListener('wheel', (e) => {
                    e.preventDefault();
                    camera.position.multiplyScalar(1 + e.deltaY * 0.001);
                }, { passive: false });

                window.addEventListener('resize', () => {
                    const w = viewer.clientWidth;
                    const h = viewer.clientHeight;
                    camera.aspect = w / h;
                    camera.updateProjectionMatrix();
                    renderer.setSize(w, h);
                });

                animate();
            } catch (err) {
                showError('Failed to initialize 3D viewer: ' + err.message);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            container3D.rotation.y += 0.002;
            renderer.render(scene, camera);
        }

        function createContainer() {
            while (container3D.children.length > 0) {
                container3D.removeChild(container3D.children[0]);
            }

            try {
                const w = Math.max(1, Math.floor(parseFloat(document.getElementById('width').value)) || 3);
                const h = Math.max(1, Math.floor(parseFloat(document.getElementById('height').value)) || 3);
                const magnetDia = Math.max(4, Math.min(8, parseFloat(document.getElementById('magnetDia').value)) || 6.5);
                const includeBase = document.getElementById('includeBase').checked;

                // Calculate dimensions per spec
                const containerWidth = w * SPECS.BASE_SIZE;
                const containerHeight = h * SPECS.BASE_SIZE;
                const containerDepth = h * SPECS.UNIT_HEIGHT + SPECS.STACKABLE_LIP;

                // Main container box (simplified for visualization)
                const boxGeometry = new THREE.BoxGeometry(containerWidth, containerHeight, containerDepth);
                const boxMaterial = new THREE.MeshPhongMaterial({ 
                    color: 0x667eea,
                    shininess: 30
                });
                const box = new THREE.Mesh(boxGeometry, boxMaterial);
                box.position.z = containerDepth / 2;
                container3D.add(box);

                // Grid lines showing unit divisions
                const lineMaterial = new THREE.LineBasicMaterial({ color: 0xcccccc, linewidth: 1 });

                // Vertical grid lines
                for (let x = 0; x <= w; x++) {
                    const geometry = new THREE.BufferGeometry();
                    const points = [
                        new THREE.Vector3(-containerWidth / 2 + x * SPECS.BASE_SIZE, -containerHeight / 2, containerDepth),
                        new THREE.Vector3(-containerWidth / 2 + x * SPECS.BASE_SIZE, containerHeight / 2, containerDepth)
                    ];
                    geometry.setFromPoints(points);
                    container3D.add(new THREE.Line(geometry, lineMaterial));
                }

                // Horizontal grid lines
                for (let y = 0; y <= h; y++) {
                    const geometry = new THREE.BufferGeometry();
                    const points = [
                        new THREE.Vector3(-containerWidth / 2, -containerHeight / 2 + y * SPECS.BASE_SIZE, containerDepth),
                        new THREE.Vector3(containerWidth / 2, -containerHeight / 2 + y * SPECS.BASE_SIZE, containerDepth)
                    ];
                    geometry.setFromPoints(points);
                    container3D.add(new THREE.Line(geometry, lineMaterial));
                }

                // Base plate
                if (includeBase) {
                    const baseGeometry = new THREE.BoxGeometry(containerWidth + 2, containerHeight + 2, SPECS.BASEPLATE_HEIGHT);
                    const baseMaterial = new THREE.MeshPhongMaterial({ 
                        color: 0x764ba2,
                        shininess: 25
                    });
                    const basePlate = new THREE.Mesh(baseGeometry, baseMaterial);
                    basePlate.position.z = SPECS.BASEPLATE_HEIGHT / 2 - containerDepth;
                    container3D.add(basePlate);

                    // Magnet holes in base plate
                    const holeGeometry = new THREE.CylinderGeometry(magnetDia / 2, magnetDia / 2, SPECS.BASEPLATE_HEIGHT + 1, 16);
                    const holeMaterial = new THREE.MeshPhongMaterial({ color: 0x333333 });

                    for (let x = 0; x < w; x++) {
                        for (let y = 0; y < h; y++) {
                            const holePosX = -containerWidth / 2 + (x + 0.5) * SPECS.BASE_SIZE;
                            const holePosY = -containerHeight / 2 + (y + 0.5) * SPECS.BASE_SIZE;
                            const hole = new THREE.Mesh(holeGeometry, holeMaterial);
                            hole.position.set(holePosX, holePosY, -1);
                            hole.rotation.x = Math.PI / 2;
                            container3D.add(hole);
                        }
                    }
                }

                // Update statistics
                document.getElementById('statWidth').textContent = (containerWidth).toFixed(1) + 'mm';
                document.getElementById('statHeight').textContent = (containerHeight).toFixed(1) + 'mm';
                document.getElementById('statDepth').textContent = (containerDepth).toFixed(1) + 'mm';
                document.getElementById('statUnits').textContent = (w * h);

            } catch (err) {
                showError('Error: ' + err.message);
            }
        }

        function resetForm() {
            document.getElementById('width').value = 3;
            document.getElementById('height').value = 3;
            document.getElementById('magnetDia').value = 6.5;
            document.getElementById('includeBase').checked = true;
            updatePreview();
        }

        function updatePreview() {
            createContainer();
        }

        function exportSTL() {
            try {
                const w = Math.max(1, Math.floor(parseFloat(document.getElementById('width').value)) || 3);
                const h = Math.max(1, Math.floor(parseFloat(document.getElementById('height').value)) || 3);
                const magnetDia = parseFloat(document.getElementById('magnetDia').value) || 6.5;
                const includeBase = document.getElementById('includeBase').checked;

                const containerWidth = w * SPECS.BASE_SIZE;
                const containerHeight = h * SPECS.BASE_SIZE;
                const containerDepth = h * SPECS.UNIT_HEIGHT + SPECS.STACKABLE_LIP;

                let stl = 'solid gridfinity\n';

                // Main box faces
                const vertices = [
                    [0, 0, 0], [containerWidth, 0, 0], [containerWidth, containerHeight, 0], [0, containerHeight, 0],
                    [0, 0, containerDepth], [containerWidth, 0, containerDepth], [containerWidth, containerHeight, containerDepth], [0, containerHeight, containerDepth]
                ];

                const faces = [
                    [0, 1, 2], [0, 2, 3],
                    [4, 6, 5], [4, 7, 6],
                    [0, 4, 5], [0, 5, 1],
                    [2, 6, 7], [2, 7, 3],
                    [0, 3, 7], [0, 7, 4],
                    [1, 5, 6], [1, 6, 2]
                ];

                faces.forEach(face => {
                    const v0 = vertices[face[0]];
                    const v1 = vertices[face[1]];
                    const v2 = vertices[face[2]];

                    const edge1 = [v1[0] - v0[0], v1[1] - v0[1], v1[2] - v0[2]];
                    const edge2 = [v2[0] - v0[0], v2[1] - v0[1], v2[2] - v0[2]];
                    const normal = [
                        edge1[1] * edge2[2] - edge1[2] * edge2[1],
                        edge1[2] * edge2[0] - edge1[0] * edge2[2],
                        edge1[0] * edge2[1] - edge1[1] * edge2[0]
                    ];

                    const len = Math.sqrt(normal[0]*normal[0] + normal[1]*normal[1] + normal[2]*normal[2]);
                    if (len === 0) return;
                    const n = [normal[0] / len, normal[1] / len, normal[2] / len];

                    stl += `  facet normal ${n[0].toFixed(6)} ${n[1].toFixed(6)} ${n[2].toFixed(6)}\n`;
                    stl += `    outer loop\n`;
                    stl += `      vertex ${v0[0].toFixed(3)} ${v0[1].toFixed(3)} ${v0[2].toFixed(3)}\n`;
                    stl += `      vertex ${v1[0].toFixed(3)} ${v1[1].toFixed(3)} ${v1[2].toFixed(3)}\n`;
                    stl += `      vertex ${v2[0].toFixed(3)} ${v2[1].toFixed(3)} ${v2[2].toFixed(3)}\n`;
                    stl += `    endloop\n`;
                    stl += `  endfacet\n`;
                });

                stl += 'endsolid gridfinity\n';

                const blob = new Blob([stl], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `gridfinity-${w}x${h}u-${magnetDia}mm.stl`;
                link.click();
                URL.revokeObjectURL(url);
            } catch (err) {
                showError('Export failed: ' + err.message);
            }
        }

        // Event listeners
        ['width', 'height', 'magnetDia', 'includeBase'].forEach(id => {
            document.getElementById(id).addEventListener('change', updatePreview);
            document.getElementById(id).addEventListener('input', updatePreview);
        });

        // Initialize
        initThree();
        createContainer();
    </script>
</body>
</html>
