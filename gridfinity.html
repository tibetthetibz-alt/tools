<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Gridfinity Planner — Tibet's Tools</title>
<link rel="icon" type="image/png" href="logo-light.png"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Big+Shoulders+Display:wght@800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0e12;--bg2:#16161c;--bg3:#1c1c24;--border:#2a2a38;
  --text:#f0f0ff;--text2:#7070a0;--accent:#01c6f1;--green:#6aff7e;
  --nav-bg:rgba(14,14,18,0.92);--grid-color:rgba(1,198,241,0.025);
  --cell:#1c1c24;--cell-half:#162030;--cell-empty:rgba(255,255,255,0.03);
  --cell-border:#2a2a38;--cut:#ff6b6b;
}
[data-theme="light"]{
  --bg:#f4f4f8;--bg2:#ffffff;--bg3:#ebebf2;--border:#d0d0e0;
  --text:#0e0e1a;--text2:#6060a0;--accent:#0099cc;--green:#22a83a;
  --nav-bg:rgba(244,244,248,0.92);--grid-color:rgba(0,153,204,0.04);
  --cell:#e8f4ff;--cell-half:#d0eeff;--cell-empty:rgba(0,0,0,0.03);
  --cell-border:#b0c8e0;--cut:#cc2200;
}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;overflow-x:hidden;transition:background .3s,color .3s}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--grid-color) 1px,transparent 1px),linear-gradient(90deg,var(--grid-color) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0}
nav{position:sticky;top:0;z-index:50;background:var(--nav-bg);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between}
.nav-left{display:flex;align-items:center;gap:12px;text-decoration:none}
.nav-logo-img{width:30px;height:30px;object-fit:contain}
.nav-right{display:flex;align-items:center;gap:12px}
.nav-tag{font-size:10px;letter-spacing:.2em;color:var(--text2);text-transform:uppercase}
.theme-toggle{width:34px;height:34px;border-radius:9px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.theme-toggle:hover{border-color:var(--accent);color:var(--accent)}
.icon-sun{display:none}.icon-moon{display:block}
[data-theme="light"] .icon-sun{display:block}[data-theme="light"] .icon-moon{display:none}
.page{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:32px 24px 80px}
h1{font-family:'Big Shoulders Display',sans-serif;font-size:clamp(28px,5vw,52px);font-weight:900;background:linear-gradient(135deg,var(--text) 40%,var(--accent) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px;line-height:1}
.sub{font-size:11px;color:var(--text2);margin-bottom:28px}
</style>
</head>
<body>
<nav>
  <a class="nav-left" href="index.html">
    <img class="nav-logo-img" id="nav-logo" src="logo-dark.png" alt="Logo"/>
  </a>
  <div class="nav-right">
    <span class="nav-tag">gridfinity</span>
    <button class="theme-toggle" onclick="toggleTheme()">
      <svg class="icon-moon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg class="icon-sun" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/></svg>
    </button>
  </div>
</nav>
<div class="page">
  <h1>GRIDFINITY PLANNER</h1>
  <p class="sub">Design baseplate layouts, auto-split by printer bed, export cut lines</p>

<style>
/* ── CONTROLS ── */
.controls{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;margin-bottom:28px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:20px}
.card-title{font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:var(--text2);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.card-title::after{content:'';flex:1;height:1px;background:var(--border)}
.field{margin-bottom:12px}
.field label{display:block;font-size:11px;color:var(--text2);margin-bottom:5px}
.field input,.field select{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 11px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;outline:none;transition:border-color .15s}
.field input:focus,.field select:focus{border-color:var(--accent)}
.field input[type=range]{padding:4px 0;accent-color:var(--accent)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:9px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;transition:all .15s}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn.primary{background:var(--accent);color:#0e0e12;border-color:var(--accent);font-weight:600}
.btn.primary:hover{opacity:.85}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:28px}

/* ── LEGEND ── */
.legend{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:16px;font-size:10px;color:var(--text2)}
.legend-item{display:flex;align-items:center;gap:6px}
.legend-swatch{width:14px;height:14px;border-radius:3px;border:1px solid var(--border)}

/* ── GRID CANVAS ── */
#grid-wrap{overflow:auto;border:1px solid var(--border);border-radius:14px;background:var(--bg2);padding:16px;margin-bottom:24px;position:relative}
#grid-canvas{display:block;margin:0 auto}

/* ── STATS ── */
.stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:28px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.stat-val{font-family:'Big Shoulders Display',sans-serif;font-size:24px;font-weight:900;color:var(--accent);line-height:1}
.stat-key{font-size:10px;color:var(--text2);margin-top:3px;letter-spacing:.05em}

/* ── BED PARTS ── */
#parts-wrap{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
.part-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center}
.part-card canvas{display:block;margin:0 auto 10px;border-radius:6px;border:1px solid var(--border)}
.part-label{font-size:11px;color:var(--text2)}
.part-label strong{color:var(--text);display:block;font-size:12px;margin-bottom:2px}
.part-warn{font-size:10px;color:var(--cut);margin-top:4px}

/* ── TOAST ── */
#toast{position:fixed;bottom:24px;right:24px;background:var(--green);color:#000;padding:9px 16px;border-radius:8px;font-size:12px;font-weight:700;transform:translateY(60px);opacity:0;transition:all .3s;z-index:999;pointer-events:none}
#toast.show{transform:translateY(0);opacity:1}
</style>

<!-- CONTROLS -->
<div class="controls">
  <div class="card">
    <div class="card-title">Area to Fill</div>
    <div class="row2">
      <div class="field"><label>Width (mm)</label><input type="number" id="areaW" value="400" min="42" max="2000"/></div>
      <div class="field"><label>Depth (mm)</label><input type="number" id="areaD" value="300" min="42" max="2000"/></div>
    </div>
    <div class="field"><label>Grid unit size: <span id="unitLabel">42mm (standard)</span></label>
      <input type="range" id="unitSize" min="1" max="3" value="1" step="1"/>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Printer Bed</div>
    <div class="field">
      <label>Preset</label>
      <select id="bedPreset" onchange="applyBedPreset()">
        <option value="">Custom</option>
        <option value="220,220">Ender 3 / CR-10 (220×220)</option>
        <option value="235,235">Ender 3 Pro (235×235)</option>
        <option value="256,256">Bambu A1 Mini (256×256)</option>
        <option value="256,256">Prusa MINI (180×180)</option>
        <option value="300,300">CR-10 300 (300×300)</option>
        <option value="350,350">CR-10 350 (350×350)</option>
        <option value="350,350">Bambu X1 / P1 (256×256)</option>
        <option value="500,500">Voron 2.4 500 (500×500)</option>
      </select>
    </div>
    <div class="row2">
      <div class="field"><label>Bed W (mm)</label><input type="number" id="bedW" value="220" min="50" max="1000"/></div>
      <div class="field"><label>Bed D (mm)</label><input type="number" id="bedD" value="220" min="50" max="1000"/></div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Options</div>
    <div class="field"><label>Half-grid fill</label>
      <select id="halfGrid">
        <option value="1">On — fill remainder with half-grids</option>
        <option value="0">Off — leave remainder empty</option>
      </select>
    </div>
    <div class="field"><label>Split margin (mm overlap at cuts)</label>
      <input type="number" id="splitMargin" value="0.2" min="0" max="2" step="0.1"/>
    </div>
    <div class="field"><label>Baseplate colour</label>
      <input type="color" id="baseColor" value="#01c6f1"/>
    </div>
  </div>
</div>

<div class="btn-row">
  <button class="btn primary" onclick="generate()">▶ Generate Layout</button>
  <button class="btn" onclick="exportPNG()">↓ Export PNG</button>
  <button class="btn" onclick="exportSVG()">↓ Export SVG</button>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-swatch" id="ls-full" style="background:#01c6f1"></div>Full grid (42mm)</div>
  <div class="legend-item"><div class="legend-swatch" id="ls-half" style="background:#6aff7e"></div>Half grid (21mm)</div>
  <div class="legend-item"><div class="legend-swatch" style="background:transparent"></div>Empty space</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#ff6b6b"></div>Bed cut line</div>
</div>

<div id="grid-wrap"><canvas id="grid-canvas"></canvas></div>

<div class="stats" id="stats"></div>

<div id="bed-section" style="display:none">
  <div style="font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:var(--text2);margin-bottom:14px;display:flex;align-items:center;gap:12px">
    Print Parts <span style="flex:1;height:1px;background:var(--border);display:block"></span>
  </div>
  <div id="parts-wrap"></div>
</div>

<div id="toast"></div>

<script>
// ── GRIDFINITY CONSTANTS ──
// Standard Gridfinity unit = 42mm
// Half-grid = 21mm (real half-pitch for partial fills)
// Connector/lip is centred on the unit boundary
const UNIT = 42;
const HALF = 21;
const PX_PER_MM = 1.8; // canvas scale

let layout = null; // computed layout
let bedParts = [];  // computed bed parts

// ── UNIT SIZE MULTIPLIER ──
const UNIT_LABELS = ['42mm (standard)', '84mm (2×2 base)', '126mm (3×3 base)'];
document.getElementById('unitSize').oninput = function(){
  document.getElementById('unitLabel').textContent = UNIT_LABELS[+this.value - 1];
};

// ── BED PRESETS ──
const BED_PRESETS = {
  '220,220':[220,220], '235,235':[235,235], '256,256':[256,256],
  '180,180':[180,180], '300,300':[300,300], '350,350':[350,350], '500,500':[500,500]
};
function applyBedPreset(){
  const v = document.getElementById('bedPreset').value;
  if(!v) return;
  const [w,d] = BED_PRESETS[v]||[220,220];
  document.getElementById('bedW').value = w;
  document.getElementById('bedD').value = d;
}

// ── MAIN GENERATE ──
function generate(){
  const areaW   = +document.getElementById('areaW').value;
  const areaD   = +document.getElementById('areaD').value;
  const unitMul = +document.getElementById('unitSize').value;
  const bedW    = +document.getElementById('bedW').value;
  const bedD    = +document.getElementById('bedD').value;
  const useHalf = document.getElementById('halfGrid').value === '1';
  const baseCol = document.getElementById('baseColor').value;
  const unit    = UNIT * unitMul;
  const half    = unit / 2;

  // ── BUILD CELL GRID ──
  // Each cell is: { type: 'full'|'halfX'|'halfY'|'halfXY'|'empty', x_mm, y_mm, w_mm, h_mm }
  const cells = [];
  let y = 0;
  while(y < areaD){
    let x = 0;
    const remY = areaD - y;
    const cellH = remY >= unit ? unit : (useHalf && remY >= half ? half : remY);
    const isHalfY = cellH < unit;

    while(x < areaW){
      const remX = areaW - x;
      const cellW = remX >= unit ? unit : (useHalf && remX >= half ? half : remX);
      const isHalfX = cellW < unit;

      let type = 'empty';
      if(cellW >= unit && cellH >= unit) type = 'full';
      else if((isHalfX || cellW >= half) && (isHalfY || cellH >= half)){
        if(isHalfX && isHalfY)      type = 'halfXY';
        else if(isHalfX)            type = 'halfX';
        else if(isHalfY)            type = 'halfY';
        else                        type = 'full';
      }

      cells.push({type, x_mm:x, y_mm:y, w_mm:cellW, h_mm:cellH});
      x += cellW;
      if(cellW < half) break; // skip empty slivers
    }
    y += cellH;
    if(cellH < half) break;
  }

  // ── CUT LINES (mid-connector boundaries) ──
  // Cut lines fall exactly on unit boundaries — gridfinity connectors straddle the boundary
  // so we split at the boundary midpoint (which IS the boundary line)
  const cutLinesX = []; // x positions in mm
  const cutLinesY = [];
  let bx = 0;
  while(bx + bedW < areaW){ bx += bedW; cutLinesX.push(bx); }
  let by = 0;
  while(by + bedD < areaD){ by += bedD; cutLinesY.push(by); }

  layout = { cells, areaW, areaD, unit, half, baseCol, cutLinesX, cutLinesY };

  // ── SPLIT INTO BED PARTS ──
  // Each part is defined by [x0..x1, y0..y1] in mm
  const xs = [0, ...cutLinesX, areaW];
  const ys = [0, ...cutLinesY, areaD];
  bedParts = [];
  for(let yi=0; yi<ys.length-1; yi++){
    for(let xi=0; xi<xs.length-1; xi++){
      bedParts.push({ x0:xs[xi], x1:xs[xi+1], y0:ys[yi], y1:ys[yi+1], idx:`${yi+1}-${xi+1}` });
    }
  }

  drawMain();
  updateStats();
  drawParts();
}

// ── COLOUR HELPERS ──
function hexToRgb(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return{r,g,b};
}
function mixColor(hex, ratio=0.5){
  // mix with white
  const {r,g,b}=hexToRgb(hex);
  const mr=Math.round(r+(255-r)*ratio),mg=Math.round(g+(255-g)*ratio),mb=Math.round(b+(255-b)*ratio);
  return`rgb(${mr},${mg},${mb})`;
}
function alphaColor(hex, alpha){
  const {r,g,b}=hexToRgb(hex);
  return`rgba(${r},${g},${b},${alpha})`;
}

// ── DRAW MAIN OVERVIEW ──
function drawMain(){
  if(!layout) return;
  const {cells,areaW,areaD,unit,half,baseCol,cutLinesX,cutLinesY} = layout;
  const sc = PX_PER_MM;
  const pad = 2;
  const canvas = document.getElementById('grid-canvas');
  canvas.width  = Math.round(areaW*sc) + pad*2;
  canvas.height = Math.round(areaD*sc) + pad*2;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // background
  ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--bg2').trim()||'#16161c';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  const isDark = document.documentElement.getAttribute('data-theme')!=='light';

  cells.forEach(c=>{
    const cx = c.x_mm*sc+pad, cy = c.y_mm*sc+pad;
    const cw = c.w_mm*sc, ch = c.h_mm*sc;
    if(c.type==='empty') return;

    // fill
    if(c.type==='full'){
      ctx.fillStyle = baseCol;
      ctx.globalAlpha = isDark ? 0.55 : 0.65;
    } else {
      // half-grid — lighter/different tint
      ctx.fillStyle = mixColor(baseCol, 0.35);
      ctx.globalAlpha = isDark ? 0.45 : 0.55;
    }
    ctx.fillRect(cx+0.5, cy+0.5, cw-1, ch-1);
    ctx.globalAlpha = 1;

    // border
    ctx.strokeStyle = isDark ? alphaColor(baseCol,0.4) : alphaColor(baseCol,0.7);
    ctx.lineWidth = 0.8;
    ctx.strokeRect(cx+0.5, cy+0.5, cw-1, ch-1);

    // connector dots at corners (full grid only)
    if(c.type==='full' && cw >= 8){
      ctx.fillStyle = isDark ? 'rgba(255,255,255,0.18)' : 'rgba(0,0,0,0.15)';
      const r=cw*0.07;
      const offsets=[[cx+cw*0.15,cy+ch*0.15],[cx+cw*0.85,cy+ch*0.15],[cx+cw*0.15,cy+ch*0.85],[cx+cw*0.85,cy+ch*0.85]];
      offsets.forEach(([px,py])=>{
        ctx.beginPath();ctx.arc(px,py,r,0,Math.PI*2);ctx.fill();
      });
    }

    // label inside full cell
    if(c.type==='full' && cw > 24){
      ctx.fillStyle = isDark ? 'rgba(255,255,255,0.5)' : 'rgba(0,0,0,0.4)';
      ctx.font = `bold ${Math.min(9,cw*0.18)}px DM Mono, monospace`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('1U', cx+cw/2, cy+ch/2);
    }
    if((c.type==='halfX'||c.type==='halfY'||c.type==='halfXY') && cw>14){
      ctx.fillStyle = isDark ? 'rgba(255,255,255,0.4)' : 'rgba(0,0,0,0.35)';
      ctx.font = `bold ${Math.min(8,cw*0.2)}px DM Mono, monospace`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('½', cx+cw/2, cy+ch/2);
    }
  });

  // ── CUT LINES ──
  ctx.setLineDash([6,4]);
  ctx.lineWidth = 1.5;
  ctx.strokeStyle = '#ff6b6b';
  cutLinesX.forEach(x=>{
    const px = x*sc+pad;
    ctx.beginPath();ctx.moveTo(px,0);ctx.lineTo(px,canvas.height);ctx.stroke();
  });
  cutLinesY.forEach(y=>{
    const py = y*sc+pad;
    ctx.beginPath();ctx.moveTo(0,py);ctx.lineTo(canvas.width,py);ctx.stroke();
  });
  ctx.setLineDash([]);

  // outer border
  ctx.strokeStyle = isDark ? 'rgba(1,198,241,0.3)' : 'rgba(0,153,204,0.4)';
  ctx.lineWidth=1.5;
  ctx.strokeRect(pad,pad,areaW*sc,areaD*sc);

  // update legend swatches
  document.getElementById('ls-full').style.background = baseCol;
  document.getElementById('ls-half').style.background = mixColor(baseCol,0.35);
}

// ── STATS ──
function updateStats(){
  if(!layout) return;
  const {cells,cutLinesX,cutLinesY,areaW,areaD} = layout;
  const full  = cells.filter(c=>c.type==='full').length;
  const half  = cells.filter(c=>c.type.startsWith('half')).length;
  const parts = (cutLinesX.length+1) * (cutLinesY.length+1);
  const usedArea = cells.filter(c=>c.type!=='empty').reduce((s,c)=>s+c.w_mm*c.h_mm,0);
  const totalArea = areaW*areaD;
  const pct = Math.round(usedArea/totalArea*100);

  document.getElementById('stats').innerHTML = `
    <div class="stat-card"><div class="stat-val">${full}</div><div class="stat-key">Full grids</div></div>
    <div class="stat-card"><div class="stat-val">${half}</div><div class="stat-key">Half grids</div></div>
    <div class="stat-card"><div class="stat-val">${parts}</div><div class="stat-key">Print parts</div></div>
    <div class="stat-card"><div class="stat-val">${pct}%</div><div class="stat-key">Area used</div></div>
    <div class="stat-card"><div class="stat-val">${areaW}×${areaD}</div><div class="stat-key">Total area (mm)</div></div>
  `;
}

// ── DRAW BED PARTS ──
function drawParts(){
  if(!layout||!bedParts.length) return;
  const {cells,baseCol,cutLinesX,cutLinesY} = layout;
  const sc = 2.2;
  const pad = 6;
  const wrap = document.getElementById('parts-wrap');
  const sec  = document.getElementById('bed-section');
  sec.style.display = bedParts.length > 1 ? 'block' : 'none';
  wrap.innerHTML = '';
  const isDark = document.documentElement.getAttribute('data-theme')!=='light';
  const margin = +document.getElementById('splitMargin').value;

  bedParts.forEach(part => {
    const pw = part.x1 - part.x0;
    const ph = part.y1 - part.y0;
    const cw = Math.round(pw*sc)+pad*2;
    const ch = Math.round(ph*sc)+pad*2;

    const cv = document.createElement('canvas');
    cv.width=cw; cv.height=ch;
    const ctx = cv.getContext('2d');
    ctx.fillStyle = isDark ? '#16161c' : '#f0f4f8';
    ctx.fillRect(0,0,cw,ch);

    // cells that fall in this part
    cells.forEach(c=>{
      // clip to part bounds (with margin overlap)
      const cx0 = Math.max(c.x_mm, part.x0 - margin);
      const cy0 = Math.max(c.y_mm, part.y0 - margin);
      const cx1 = Math.min(c.x_mm+c.w_mm, part.x1 + margin);
      const cy1 = Math.min(c.y_mm+c.h_mm, part.y1 + margin);
      if(cx1<=cx0||cy1<=cy0) return;
      if(c.type==='empty') return;

      const px = (cx0-part.x0)*sc+pad;
      const py = (cy0-part.y0)*sc+pad;
      const prw = (cx1-cx0)*sc;
      const prh = (cy1-cy0)*sc;

      if(c.type==='full'){
        ctx.fillStyle = baseCol;
        ctx.globalAlpha = isDark?0.6:0.7;
      } else {
        ctx.fillStyle = mixColor(baseCol,0.35);
        ctx.globalAlpha = isDark?0.5:0.6;
      }
      ctx.fillRect(px+0.5,py+0.5,prw-1,prh-1);
      ctx.globalAlpha=1;
      ctx.strokeStyle=alphaColor(baseCol,0.5);
      ctx.lineWidth=0.7;
      ctx.strokeRect(px+0.5,py+0.5,prw-1,prh-1);

      // corner dots for full cells
      if(c.type==='full' && prw>10){
        ctx.fillStyle=isDark?'rgba(255,255,255,0.2)':'rgba(0,0,0,0.15)';
        const r=prw*0.08;
        [[px+prw*0.15,py+prh*0.15],[px+prw*0.85,py+prh*0.15],
         [px+prw*0.15,py+prh*0.85],[px+prw*0.85,py+prh*0.85]].forEach(([bx,by])=>{
          ctx.beginPath();ctx.arc(bx,by,r,0,Math.PI*2);ctx.fill();
        });
      }
    });

    // outer border
    ctx.strokeStyle=isDark?'rgba(1,198,241,0.4)':'rgba(0,153,204,0.5)';
    ctx.lineWidth=1.2;
    ctx.strokeRect(pad,pad,pw*sc,ph*sc);

    // cut edge indicators
    ctx.setLineDash([4,3]);
    ctx.strokeStyle='#ff6b6b';
    ctx.lineWidth=1;
    if(cutLinesX.includes(part.x0)){ ctx.beginPath();ctx.moveTo(pad,pad);ctx.lineTo(pad,ch-pad);ctx.stroke(); }
    if(cutLinesX.includes(part.x1)){ ctx.beginPath();ctx.moveTo(cw-pad,pad);ctx.lineTo(cw-pad,ch-pad);ctx.stroke(); }
    if(cutLinesY.includes(part.y0)){ ctx.beginPath();ctx.moveTo(pad,pad);ctx.lineTo(cw-pad,pad);ctx.stroke(); }
    if(cutLinesY.includes(part.y1)){ ctx.beginPath();ctx.moveTo(pad,ch-pad);ctx.lineTo(cw-pad,ch-pad);ctx.stroke(); }
    ctx.setLineDash([]);

    const partCells = cells.filter(c=>c.type!=='empty'&&c.x_mm<part.x1&&c.x_mm+c.w_mm>part.x0&&c.y_mm<part.y1&&c.y_mm+c.h_mm>part.y0);
    const fullCount = partCells.filter(c=>c.type==='full').length;
    const halfCount = partCells.filter(c=>c.type.startsWith('half')).length;
    const fitsBed = pw <= +document.getElementById('bedW').value && ph <= +document.getElementById('bedD').value;

    const div = document.createElement('div');
    div.className='part-card';
    div.innerHTML=`<div class="part-label"><strong>Part ${part.idx}</strong>${pw.toFixed(0)}×${ph.toFixed(0)}mm<br>${fullCount} full${halfCount?', '+halfCount+' half':''}</div>${!fitsBed?'<div class="part-warn">⚠ Exceeds bed size</div>':''}`;
    div.insertBefore(cv, div.firstChild);
    wrap.appendChild(div);
  });
}

// ── EXPORTS ──
function exportPNG(){
  if(!layout){showToast('Generate a layout first');return;}
  const link=document.createElement('a');
  link.href=document.getElementById('grid-canvas').toDataURL('image/png');
  link.download='gridfinity-layout.png';link.click();
  showToast('PNG exported');
}

function exportSVG(){
  if(!layout){showToast('Generate a layout first');return;}
  const {cells,areaW,areaD,baseCol,cutLinesX,cutLinesY}=layout;
  let svg=`<svg width="${areaW}" height="${areaD}" viewBox="0 0 ${areaW} ${areaD}" xmlns="http://www.w3.org/2000/svg">`;
  svg+=`<rect width="${areaW}" height="${areaD}" fill="#f8f8f8"/>`;
  cells.forEach(c=>{
    if(c.type==='empty') return;
    const fill = c.type==='full' ? baseCol : mixColor(baseCol,0.35);
    svg+=`<rect x="${c.x_mm+0.3}" y="${c.y_mm+0.3}" width="${c.w_mm-0.6}" height="${c.h_mm-0.6}" fill="${fill}" fill-opacity="0.65" stroke="${baseCol}" stroke-opacity="0.5" stroke-width="0.5"/>`;
  });
  [...cutLinesX].forEach(x=>{svg+=`<line x1="${x}" y1="0" x2="${x}" y2="${areaD}" stroke="#ff6b6b" stroke-width="0.8" stroke-dasharray="4,3"/>`;});
  [...cutLinesY].forEach(y=>{svg+=`<line x1="0" y1="${y}" x2="${areaW}" y2="${y}" stroke="#ff6b6b" stroke-width="0.8" stroke-dasharray="4,3"/>`;});
  svg+=`<rect width="${areaW}" height="${areaD}" fill="none" stroke="${baseCol}" stroke-opacity="0.4" stroke-width="1"/>`;
  svg+='</svg>';
  const blob=new Blob([svg],{type:'image/svg+xml'});
  const link=document.createElement('a');link.href=URL.createObjectURL(blob);link.download='gridfinity-layout.svg';link.click();
  showToast('SVG exported');
}

// ── TOAST ──
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

// ── THEME ──
const _sv=localStorage.getItem('theme')||'dark';
document.documentElement.setAttribute('data-theme',_sv);
document.getElementById('nav-logo').src=_sv==='dark'?'logo-dark.png':'logo-light.png';
function toggleTheme(){
  const t=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',t);
  document.getElementById('nav-logo').src=t==='dark'?'logo-dark.png':'logo-light.png';
  localStorage.setItem('theme',t);
  if(layout) { drawMain(); drawParts(); }
}

// auto-generate on load
generate();
