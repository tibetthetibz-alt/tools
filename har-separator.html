<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HAR Separator — Tibet's Tools</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="logo-light.png"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0c10;
      --surface: #111418;
      --surface2: #181c22;
      --border: #23282f;
      --accent: #00e5a0;
      --accent2: #0099ff;
      --accent3: #ff6b35;
      --text: #e8edf3;
      --muted: #6b7685;
      --danger: #ff4757;
      --nav-bg: rgba(10,12,16,0.92);
    }

    [data-theme="light"] {
      --bg: #f4f6f8;
      --surface: #ffffff;
      --surface2: #eef0f4;
      --border: #d0d5de;
      --accent: #00a872;
      --accent2: #0077cc;
      --accent3: #e05a20;
      --text: #0a0c10;
      --muted: #5a6270;
      --danger: #cc2233;
      --nav-bg: rgba(244,246,248,0.92);
    }

    html { transition: background 0.3s, color 0.3s; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .app {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    /* Header */
    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 48px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .logo-tag {
      font-size: 10px;
      letter-spacing: 0.3em;
      color: var(--accent);
      text-transform: uppercase;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(28px, 4vw, 44px);
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1;
      background: linear-gradient(135deg, var(--text) 30%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 12px;
      color: var(--muted);
      max-width: 280px;
      text-align: right;
      line-height: 1.6;
    }

    /* Drop zone */
    .drop-zone {
      border: 1px dashed var(--border);
      border-radius: 16px;
      padding: 60px 40px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
      background: var(--surface);
      position: relative;
      overflow: hidden;
    }

    .drop-zone::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(0,229,160,0.05) 0%, transparent 70%);
      pointer-events: none;
    }

    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--accent);
      background: #111a16;
    }

    .drop-zone.drag-over::before {
      background: radial-gradient(ellipse at 50% 0%, rgba(0,229,160,0.12) 0%, transparent 70%);
    }

    .drop-icon {
      width: 56px;
      height: 56px;
      margin: 0 auto 20px;
      border: 1px solid var(--border);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface2);
      font-size: 24px;
      transition: all 0.2s;
    }

    .drop-zone:hover .drop-icon {
      border-color: var(--accent);
      box-shadow: 0 0 20px rgba(0,229,160,0.15);
    }

    .drop-title {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .drop-sub {
      font-size: 12px;
      color: var(--muted);
    }

    .drop-sub span {
      color: var(--accent);
      cursor: pointer;
    }

    #file-input { display: none; }

    /* Filters panel */
    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin: 32px 0;
      align-items: center;
    }

    .filter-label {
      font-size: 11px;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
      margin-right: 4px;
    }

    .pill {
      padding: 6px 14px;
      border-radius: 100px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .pill:hover { border-color: #444; color: var(--text); }

    .pill.active {
      background: rgba(0,229,160,0.1);
      border-color: var(--accent);
      color: var(--accent);
    }

    .pill .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    .search-box {
      margin-left: auto;
      position: relative;
    }

    .search-box input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 14px 8px 36px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      width: 220px;
      transition: all 0.2s;
      outline: none;
    }

    .search-box input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,229,160,0.08);
    }

    .search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 14px;
      pointer-events: none;
    }

    /* Stats bar */
    .stats-bar {
      display: flex;
      gap: 24px;
      margin-bottom: 24px;
      padding: 16px 20px;
      background: var(--surface);
      border-radius: 10px;
      border: 1px solid var(--border);
    }

    .stat {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .stat-val {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
    }

    .stat-key {
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .divider { width: 1px; background: var(--border); }

    /* Entry list */
    .entries-header {
      display: grid;
      grid-template-columns: 60px 80px 1fr 120px 80px 100px 80px;
      gap: 8px;
      padding: 8px 16px;
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
      margin-bottom: 4px;
    }

    .entry {
      display: grid;
      grid-template-columns: 60px 80px 1fr 120px 80px 100px 80px;
      gap: 8px;
      padding: 10px 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
      align-items: center;
      border: 1px solid transparent;
    }

    .entry:hover {
      background: var(--surface);
      border-color: var(--border);
    }

    .entry.selected {
      background: rgba(0,229,160,0.05);
      border-color: rgba(0,229,160,0.2);
    }

    .entry-cell {
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .method-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    .m-GET    { background: rgba(0,229,160,0.12); color: var(--accent); }
    .m-POST   { background: rgba(0,153,255,0.12); color: var(--accent2); }
    .m-PUT    { background: rgba(255,193,7,0.12); color: #ffc107; }
    .m-DELETE { background: rgba(255,71,87,0.12); color: var(--danger); }
    .m-PATCH  { background: rgba(255,107,53,0.12); color: var(--accent3); }
    .m-OTHER  { background: rgba(107,118,133,0.12); color: var(--muted); }

    .status-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
    }

    .s-2xx { background: rgba(0,229,160,0.12); color: var(--accent); }
    .s-3xx { background: rgba(255,193,7,0.12); color: #ffc107; }
    .s-4xx { background: rgba(255,107,53,0.12); color: var(--accent3); }
    .s-5xx { background: rgba(255,71,87,0.12); color: var(--danger); }
    .s-0   { background: rgba(107,118,133,0.12); color: var(--muted); }

    .url-cell { color: var(--muted); font-size: 11px; }
    .url-cell .url-path { color: var(--text); }

    .size-cell { color: var(--muted); font-size: 11px; }
    .time-cell { color: var(--accent2); font-size: 11px; }

    /* Detail panel */
    .detail-panel {
      position: fixed;
      top: 0; right: 0; bottom: 0;
      width: 460px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      z-index: 100;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
      overflow: hidden;
    }

    .detail-panel.open {
      transform: translateX(0);
      box-shadow: -20px 0 60px rgba(0,0,0,0.5);
    }

    .detail-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-shrink: 0;
    }

    .detail-title {
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 600;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .close-btn {
      width: 28px; height: 28px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .close-btn:hover { color: var(--text); border-color: #444; }

    .detail-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .detail-tab {
      padding: 10px 16px;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }

    .detail-tab:hover { color: var(--text); }
    .detail-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    .detail-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
    }

    .detail-body::-webkit-scrollbar { width: 4px; }
    .detail-body::-webkit-scrollbar-track { background: transparent; }
    .detail-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .kv-table { width: 100%; border-collapse: collapse; }

    .kv-table tr { border-bottom: 1px solid var(--border); }
    .kv-table tr:last-child { border-bottom: none; }

    .kv-table td {
      padding: 8px 0;
      font-size: 11px;
      vertical-align: top;
    }

    .kv-table td:first-child {
      color: var(--muted);
      width: 140px;
      padding-right: 12px;
      font-weight: 600;
    }

    .kv-table td:last-child {
      color: var(--text);
      word-break: break-all;
    }

    .code-block {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      font-size: 11px;
      line-height: 1.7;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-all;
      color: var(--accent);
    }

    .section-title {
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 20px 0 10px;
    }

    .section-title:first-child { margin-top: 0; }

    /* Export controls */
    .export-bar {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      flex-shrink: 0;
    }

    .btn {
      padding: 9px 18px;
      border-radius: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      border: 1px solid transparent;
    }

    .btn-primary {
      background: var(--accent);
      color: #000;
      flex: 1;
    }

    .btn-primary:hover { background: #00ffa8; }

    .btn-ghost {
      background: transparent;
      border-color: var(--border);
      color: var(--muted);
    }

    .btn-ghost:hover { border-color: #444; color: var(--text); }

    /* Action buttons top */
    .action-row {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      align-items: center;
    }

    .btn-sm {
      padding: 7px 14px;
      border-radius: 7px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
    }

    .btn-sm:hover { color: var(--text); border-color: #444; }
    .btn-sm.active { background: rgba(0,229,160,0.1); border-color: var(--accent); color: var(--accent); }

    .count-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,229,160,0.15);
      color: var(--accent);
      border-radius: 100px;
      font-size: 10px;
      font-weight: 700;
      padding: 1px 7px;
      min-width: 22px;
      margin-left: 6px;
    }

    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
    }

    .empty-icon { font-size: 40px; margin-bottom: 16px; }
    .empty-title { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
    .empty-sub { font-size: 12px; line-height: 1.6; }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 99;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }

    .overlay.show {
      opacity: 1;
      pointer-events: all;
    }

    .filename-display {
      font-size: 11px;
      color: var(--accent);
      background: rgba(0,229,160,0.08);
      border: 1px solid rgba(0,229,160,0.2);
      border-radius: 6px;
      padding: 4px 10px;
    }

    .export-all-btn {
      margin-left: auto;
      padding: 8px 18px;
      border-radius: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      background: rgba(0,153,255,0.1);
      border: 1px solid rgba(0,153,255,0.3);
      color: var(--accent2);
      transition: all 0.15s;
    }

    .export-all-btn:hover {
      background: rgba(0,153,255,0.18);
    }

    .type-tag {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--border);
    }

    @media (max-width: 700px) {
      .entries-header, .entry { grid-template-columns: 60px 60px 1fr 80px; }
      .entries-header > *:nth-child(5),
      .entries-header > *:nth-child(6),
      .entries-header > *:nth-child(7),
      .entry > *:nth-child(5),
      .entry > *:nth-child(6),
      .entry > *:nth-child(7) { display: none; }
      .detail-panel { width: 100%; }
    }
  </style>
</head>
<body>
  <nav style="position:sticky;top:0;z-index:200;background:var(--nav-bg);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;">
    <a href="index.html" style="display:flex;align-items:center;gap:10px;text-decoration:none;">
      <img id="nav-logo" src="logo-dark.png" style="width:30px;height:30px;object-fit:contain;" alt="Logo"/>
    </a>
    <div style="display:flex;align-items:center;gap:12px;">
      <span style="font-size:10px;letter-spacing:0.2em;color:var(--muted);text-transform:uppercase;">har separator</span>
      <button onclick="toggleTheme()" id="theme-btn" title="Toggle theme" style="width:34px;height:34px;border-radius:9px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;">
        <svg id="icon-moon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg id="icon-sun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/></svg>
      </button>
    </div>
  </nav>
  <div class="app" id="app">
    <header>
      <div class="logo">
        <span class="logo-tag">// tool</span>
        <h1>HAR Separator</h1>
      </div>
      <div class="subtitle"></div>
    </header>

    <div id="upload-section">
      <div class="drop-zone" id="drop-zone">
        <div class="drop-icon">📂</div>
        <div class="drop-title">Drop your .har file here</div>
        <div class="drop-sub">or <span id="browse-link">browse files</span> to upload</div>
        <input type="file" id="file-input" accept=".har,application/json" />
      </div>
    </div>

    <div id="main-section" style="display:none">
      <div class="filters" id="filters-row">
        <span class="filter-label">Method</span>
        <!-- pills injected by JS -->
      </div>

      <div class="stats-bar" id="stats-bar"></div>

      <div class="action-row">
        <span id="filename-display" class="filename-display"></span>
        <button class="btn-sm" id="btn-reset">↩ Load new file</button>
        <button class="btn-sm active" id="btn-select-all">Select all</button>
        <button class="export-all-btn" id="btn-export-selected">⬇ Export selected as HAR</button>
      </div>

      <div class="entries-header">
        <div>#</div>
        <div>Method</div>
        <div>URL</div>
        <div>Type</div>
        <div>Status</div>
        <div>Size</div>
        <div>Time</div>
      </div>
      <div id="entries-list"></div>
    </div>
  </div>

  <!-- Detail panel -->
  <div class="overlay" id="overlay"></div>
  <div class="detail-panel" id="detail-panel">
    <div class="detail-header">
      <div class="detail-title" id="detail-title">Request Details</div>
      <button class="close-btn" id="close-detail">✕</button>
    </div>
    <div class="detail-tabs" id="detail-tabs">
      <div class="detail-tab active" data-tab="general">General</div>
      <div class="detail-tab" data-tab="headers">Headers</div>
      <div class="detail-tab" data-tab="request">Request</div>
      <div class="detail-tab" data-tab="response">Response</div>
      <div class="detail-tab" data-tab="timing">Timing</div>
    </div>
    <div class="detail-body" id="detail-body"></div>
    <div class="export-bar">
      <button class="btn btn-ghost" id="btn-copy-curl">Copy as cURL</button>
      <button class="btn btn-primary" id="btn-export-single">Export entry</button>
    </div>
  </div>

  <script>
    let harData = null;
    let allEntries = [];
    let filteredEntries = [];
    let selectedIndices = new Set();
    let currentEntry = null;
    let activeTab = 'general';
    let methodFilter = 'ALL';
    let statusFilter = 'ALL';
    let searchQuery = '';
    let currentFilename = 'export.har';

    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const uploadSection = document.getElementById('upload-section');
    const mainSection = document.getElementById('main-section');
    const entriesList = document.getElementById('entries-list');
    const detailPanel = document.getElementById('detail-panel');
    const overlay = document.getElementById('overlay');

    // Drag & Drop
    document.getElementById('browse-link').onclick = () => fileInput.click();
    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file) loadFile(file);
    });
    fileInput.addEventListener('change', e => { if (e.target.files[0]) loadFile(e.target.files[0]); });

    function loadFile(file) {
      currentFilename = file.name.replace(/\.har$/i, '') + '_export.har';
      const reader = new FileReader();
      reader.onload = e => {
        try {
          harData = JSON.parse(e.target.result);
          allEntries = (harData.log.entries || []).map((entry, i) => ({ ...entry, _idx: i }));
          selectedIndices = new Set(allEntries.map(e => e._idx));
          uploadSection.style.display = 'none';
          mainSection.style.display = 'block';
          buildFilters();
          applyFilters();
          document.getElementById('filename-display').textContent = file.name;
        } catch (err) {
          alert('Invalid HAR file: ' + err.message);
        }
      };
      reader.readAsText(file);
    }

    function buildFilters() {
      const methods = [...new Set(allEntries.map(e => e.request.method.toUpperCase()))].sort();
      const row = document.getElementById('filters-row');
      row.innerHTML = `<span class="filter-label">Method</span>`;

      const allPill = makePill('ALL', 'ALL', true, () => { methodFilter = 'ALL'; applyFilters(); updateMethodPills(); });
      row.appendChild(allPill);

      methods.forEach(m => {
        const pill = makePill(m, m, false, () => { methodFilter = m; applyFilters(); updateMethodPills(); });
        pill.dataset.method = m;
        row.appendChild(pill);
      });

      row.innerHTML += '';
      // Status filter
      const statusLabel = document.createElement('span');
      statusLabel.className = 'filter-label';
      statusLabel.style.marginLeft = '16px';
      statusLabel.textContent = 'Status';
      row.appendChild(statusLabel);

      ['ALL','2xx','3xx','4xx','5xx'].forEach((s, i) => {
        const pill = makePill(s, s, s === 'ALL', () => { statusFilter = s; applyFilters(); updateStatusPills(); });
        pill.dataset.status = s;
        row.appendChild(pill);
      });

      // Search
      const searchBox = document.createElement('div');
      searchBox.className = 'search-box';
      searchBox.innerHTML = `<span class="search-icon">🔍</span><input type="text" id="search-input" placeholder="Filter by URL..." />`;
      row.appendChild(searchBox);
      document.getElementById('search-input').addEventListener('input', e => {
        searchQuery = e.target.value.toLowerCase();
        applyFilters();
      });
    }

    function makePill(label, value, active, onClick) {
      const pill = document.createElement('div');
      pill.className = 'pill' + (active ? ' active' : '');
      pill.innerHTML = `<span class="dot"></span>${label}`;
      pill.addEventListener('click', () => { onClick(); });
      return pill;
    }

    function updateMethodPills() {
      document.querySelectorAll('[data-method]').forEach(p => {
        p.classList.toggle('active', p.dataset.method === methodFilter);
      });
      const allPills = document.querySelectorAll('#filters-row .pill');
      allPills[0]?.classList.toggle('active', methodFilter === 'ALL');
    }

    function updateStatusPills() {
      document.querySelectorAll('[data-status]').forEach(p => {
        p.classList.toggle('active', p.dataset.status === statusFilter);
      });
    }

    function applyFilters() {
      filteredEntries = allEntries.filter(e => {
        const method = e.request.method.toUpperCase();
        const status = e.response.status;
        const url = e.request.url.toLowerCase();

        if (methodFilter !== 'ALL' && method !== methodFilter) return false;
        if (statusFilter !== 'ALL') {
          const prefix = statusFilter[0];
          if (String(status)[0] !== prefix) return false;
        }
        if (searchQuery && !url.includes(searchQuery)) return false;
        return true;
      });
      renderStats();
      renderEntries();
    }

    function renderStats() {
      const total = filteredEntries.length;
      const totalSize = filteredEntries.reduce((s, e) => s + (e.response.bodySize > 0 ? e.response.bodySize : 0), 0);
      const totalTime = filteredEntries.reduce((s, e) => s + (e.time || 0), 0);
      const errors = filteredEntries.filter(e => e.response.status >= 400).length;

      document.getElementById('stats-bar').innerHTML = `
        <div class="stat"><div class="stat-val">${total}</div><div class="stat-key">Requests</div></div>
        <div class="divider"></div>
        <div class="stat"><div class="stat-val">${fmtSize(totalSize)}</div><div class="stat-key">Total Size</div></div>
        <div class="divider"></div>
        <div class="stat"><div class="stat-val">${fmtTime(totalTime)}</div><div class="stat-key">Total Time</div></div>
        <div class="divider"></div>
        <div class="stat"><div class="stat-val" style="color:${errors>0?'var(--danger)':'var(--accent)'}">${errors}</div><div class="stat-key">Errors</div></div>
        <div class="divider"></div>
        <div class="stat"><div class="stat-val">${selectedIndices.size}</div><div class="stat-key">Selected</div></div>
      `;
    }

    function renderEntries() {
      if (!filteredEntries.length) {
        entriesList.innerHTML = `<div class="empty-state"><div class="empty-icon">🔭</div><div class="empty-title">No entries found</div><div class="empty-sub">Try adjusting your filters or search query</div></div>`;
        return;
      }
      entriesList.innerHTML = filteredEntries.map((e, i) => {
        const method = e.request.method.toUpperCase();
        const status = e.response.status || 0;
        const url = e.request.url;
        const size = e.response.bodySize > 0 ? e.response.bodySize : (e.response.content?.size || 0);
        const time = e.time || 0;
        const mimeType = e.response.content?.mimeType || '';
        const type = shortType(mimeType);
        const isSelected = selectedIndices.has(e._idx);

        let urlObj;
        try { urlObj = new URL(url); } catch { urlObj = { pathname: url, hostname: '' }; }

        return `
          <div class="entry ${isSelected ? 'selected' : ''}" data-idx="${e._idx}" data-filter-idx="${i}">
            <div class="entry-cell" style="color:var(--muted)">${e._idx + 1}</div>
            <div class="entry-cell"><span class="method-badge m-${methodClass(method)}">${method}</span></div>
            <div class="entry-cell url-cell" title="${url}"><span class="url-path">${urlObj.pathname || url}</span><br><span style="font-size:10px;opacity:0.5">${urlObj.hostname}</span></div>
            <div class="entry-cell"><span class="type-tag">${type}</span></div>
            <div class="entry-cell"><span class="status-badge ${statusClass(status)}">${status || '—'}</span></div>
            <div class="entry-cell size-cell">${fmtSize(size)}</div>
            <div class="entry-cell time-cell">${fmtTime(time)}</div>
          </div>`;
      }).join('');

      // Click handlers
      document.querySelectorAll('.entry').forEach(el => {
        el.addEventListener('click', (ev) => {
          if (ev.target.type === 'checkbox') return;
          const idx = parseInt(el.dataset.idx);
          toggleSelect(idx, el);
          const filterIdx = parseInt(el.dataset.filterIdx);
          openDetail(filteredEntries[filterIdx]);
        });
      });
    }

    function toggleSelect(idx, el) {
      if (selectedIndices.has(idx)) {
        selectedIndices.delete(idx);
        el.classList.remove('selected');
      } else {
        selectedIndices.add(idx);
        el.classList.add('selected');
      }
      renderStats();
    }

    // Select all
    let allSelected = true;
    document.getElementById('btn-select-all').addEventListener('click', function() {
      allSelected = !allSelected;
      if (allSelected) {
        selectedIndices = new Set(filteredEntries.map(e => e._idx));
        this.textContent = 'Select all';
      } else {
        selectedIndices.clear();
        this.textContent = 'Deselect all';
      }
      renderEntries();
      renderStats();
    });

    document.getElementById('btn-reset').addEventListener('click', () => {
      harData = null; allEntries = []; filteredEntries = []; selectedIndices = new Set();
      mainSection.style.display = 'none';
      uploadSection.style.display = 'block';
      fileInput.value = '';
      closeDetail();
    });

    // Export selected
    document.getElementById('btn-export-selected').addEventListener('click', () => {
      if (!selectedIndices.size) return alert('No entries selected.');
      const selected = allEntries.filter(e => selectedIndices.has(e._idx));
      exportHAR(selected, currentFilename);
    });

    // Detail panel
    function openDetail(entry) {
      currentEntry = entry;
      document.getElementById('detail-title').textContent = entry.request.url;
      renderDetailTab(activeTab);
      detailPanel.classList.add('open');
      overlay.classList.add('show');
    }

    function closeDetail() {
      detailPanel.classList.remove('open');
      overlay.classList.remove('show');
    }

    document.getElementById('close-detail').onclick = closeDetail;
    overlay.onclick = closeDetail;

    document.querySelectorAll('.detail-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.detail-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        activeTab = tab.dataset.tab;
        renderDetailTab(activeTab);
      });
    });

    function renderDetailTab(tab) {
      if (!currentEntry) return;
      const e = currentEntry;
      const body = document.getElementById('detail-body');

      if (tab === 'general') {
        body.innerHTML = `
          <p class="section-title">Request</p>
          <table class="kv-table">
            <tr><td>URL</td><td>${e.request.url}</td></tr>
            <tr><td>Method</td><td>${e.request.method}</td></tr>
            <tr><td>HTTP Version</td><td>${e.request.httpVersion || '—'}</td></tr>
          </table>
          <p class="section-title">Response</p>
          <table class="kv-table">
            <tr><td>Status</td><td>${e.response.status} ${e.response.statusText}</td></tr>
            <tr><td>MIME Type</td><td>${e.response.content?.mimeType || '—'}</td></tr>
            <tr><td>Body Size</td><td>${fmtSize(e.response.bodySize)}</td></tr>
            <tr><td>Transfer Size</td><td>${fmtSize(e.response.headersSize)}</td></tr>
          </table>
          <p class="section-title">Timing</p>
          <table class="kv-table">
            <tr><td>Total Time</td><td>${fmtTime(e.time)}</td></tr>
            <tr><td>Started At</td><td>${e.startedDateTime || '—'}</td></tr>
          </table>
        `;
      } else if (tab === 'headers') {
        const reqH = (e.request.headers || []).map(h => `<tr><td>${h.name}</td><td>${h.value}</td></tr>`).join('');
        const resH = (e.response.headers || []).map(h => `<tr><td>${h.name}</td><td>${h.value}</td></tr>`).join('');
        body.innerHTML = `
          <p class="section-title">Request Headers</p>
          <table class="kv-table">${reqH || '<tr><td colspan="2" style="color:var(--muted)">None</td></tr>'}</table>
          <p class="section-title">Response Headers</p>
          <table class="kv-table">${resH || '<tr><td colspan="2" style="color:var(--muted)">None</td></tr>'}</table>
        `;
      } else if (tab === 'request') {
        const params = (e.request.queryString || []).map(p => `<tr><td>${p.name}</td><td>${p.value}</td></tr>`).join('');
        const postData = e.request.postData?.text || '';
        body.innerHTML = `
          ${params ? `<p class="section-title">Query Parameters</p><table class="kv-table">${params}</table>` : ''}
          ${postData ? `<p class="section-title">Request Body</p><div class="code-block">${escHtml(postData.substring(0, 2000))}${postData.length > 2000 ? '\n... (truncated)' : ''}</div>` : '<p style="color:var(--muted);font-size:12px">No request body</p>'}
        `;
      } else if (tab === 'response') {
        const text = e.response.content?.text || '';
        body.innerHTML = `
          <p class="section-title">Response Body</p>
          ${text ? `<div class="code-block">${escHtml(text.substring(0, 3000))}${text.length > 3000 ? '\n... (truncated)' : ''}</div>` : '<p style="color:var(--muted);font-size:12px">No response body</p>'}
        `;
      } else if (tab === 'timing') {
        const t = e.timings || {};
        const rows = Object.entries(t).map(([k,v]) => `<tr><td>${k}</td><td>${v >= 0 ? fmtTime(v) : '—'}</td></tr>`).join('');
        body.innerHTML = `
          <p class="section-title">Timing Breakdown</p>
          <table class="kv-table">${rows || '<tr><td colspan="2" style="color:var(--muted)">No timing data</td></tr>'}</table>
        `;
      }
    }

    // Export single entry
    document.getElementById('btn-export-single').onclick = () => {
      if (!currentEntry) return;
      exportHAR([currentEntry], 'entry_' + (currentEntry._idx + 1) + '.har');
    };

    // Copy as cURL
    document.getElementById('btn-copy-curl').onclick = () => {
      if (!currentEntry) return;
      const e = currentEntry;
      const headers = (e.request.headers || []).map(h => `-H "${h.name}: ${h.value.replace(/"/g, '\\"')}"`).join(' \\\n  ');
      const body = e.request.postData?.text ? `--data '${e.request.postData.text.replace(/'/g, "'\\''")}'` : '';
      const curl = `curl -X ${e.request.method} '${e.request.url}' \\\n  ${headers}${body ? ' \\\n  ' + body : ''}`;
      navigator.clipboard.writeText(curl).then(() => {
        const btn = document.getElementById('btn-copy-curl');
        btn.textContent = '✓ Copied!';
        setTimeout(() => btn.textContent = 'Copy as cURL', 2000);
      });
    };

    function exportHAR(entries, filename) {
      const out = {
        log: {
          ...harData.log,
          entries: entries.map(({ _idx, ...rest }) => rest)
        }
      };
      const blob = new Blob([JSON.stringify(out, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      a.click();
      URL.revokeObjectURL(a.href);
    }

    // Helpers
    function methodClass(m) {
      if (['GET','POST','PUT','DELETE','PATCH'].includes(m)) return m;
      return 'OTHER';
    }

    function statusClass(s) {
      if (!s) return 's-0';
      const p = String(s)[0];
      return 's-' + p + 'xx';
    }

    function shortType(mime) {
      if (!mime) return '—';
      if (mime.includes('json')) return 'JSON';
      if (mime.includes('html')) return 'HTML';
      if (mime.includes('javascript') || mime.includes('js')) return 'JS';
      if (mime.includes('css')) return 'CSS';
      if (mime.includes('image')) return 'IMG';
      if (mime.includes('font')) return 'Font';
      if (mime.includes('xml')) return 'XML';
      if (mime.includes('text')) return 'Text';
      return mime.split('/')[1]?.substring(0, 6) || '—';
    }

    function fmtSize(bytes) {
      if (!bytes || bytes < 0) return '—';
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
    }

    function fmtTime(ms) {
      if (!ms || ms < 0) return '—';
      if (ms < 1000) return Math.round(ms) + ' ms';
      return (ms / 1000).toFixed(2) + ' s';
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // Theme
    const _saved = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', _saved);
    document.getElementById('nav-logo').src = _saved === 'dark' ? 'logo-dark.png' : 'logo-light.png';
    if (_saved === 'light') { document.getElementById('icon-moon').style.display='none'; document.getElementById('icon-sun').style.display='block'; }
    function toggleTheme() {
      const t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', t);
      document.getElementById('nav-logo').src = t === 'dark' ? 'logo-dark.png' : 'logo-light.png';
      document.getElementById('icon-moon').style.display = t === 'dark' ? 'block' : 'none';
      document.getElementById('icon-sun').style.display  = t === 'light' ? 'block' : 'none';
      localStorage.setItem('theme', t);
    }
  </script>
</body>
</html>
