<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Scientific Calculator — Tibet's Tools</title>
<link rel="icon" type="image/png" href="logo-light.png"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500;600&family=Big+Shoulders+Display:wght@800;900&family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0e12;--bg2:#16161c;--bg3:#1c1c24;--border:#2a2a38;
  --text:#f0f0ff;--text2:#7070a0;--accent:#01c6f1;--green:#6aff7e;
  --nav-bg:rgba(14,14,18,0.92);--grid:rgba(1,198,241,0.025);
}
[data-theme="light"]{
  --bg:#f0f0f4;--bg2:#ffffff;--bg3:#e8e8f0;--border:#d0d0e0;
  --text:#0e0e1a;--text2:#6060a0;--accent:#0099cc;--green:#22a83a;
  --nav-bg:rgba(240,240,244,0.92);--grid:rgba(0,153,204,0.04);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;overflow-x:hidden;transition:background .3s,color .3s}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0}

/* NAV */
nav{position:sticky;top:0;z-index:50;background:var(--nav-bg);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between}
.nav-left{display:flex;align-items:center;gap:12px;text-decoration:none}
.nav-logo-img{width:30px;height:30px;object-fit:contain}
.nav-right{display:flex;align-items:center;gap:12px}
.nav-tag{font-size:10px;letter-spacing:.2em;color:var(--text2);text-transform:uppercase}
.theme-toggle{width:34px;height:34px;border-radius:9px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.theme-toggle:hover{border-color:var(--accent);color:var(--accent)}
.icon-sun{display:none}.icon-moon{display:block}
[data-theme="light"] .icon-sun{display:block}[data-theme="light"] .icon-moon{display:none}

/* PAGE */
.page{position:relative;z-index:1;max-width:1080px;margin:0 auto;padding:36px 24px 80px}
.page-title{font-family:'Big Shoulders Display',sans-serif;font-size:clamp(28px,5vw,48px);font-weight:900;background:linear-gradient(135deg,var(--text) 40%,var(--accent) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px}
.page-sub{font-size:11px;color:var(--text2);margin-bottom:28px}
.layout{display:grid;grid-template-columns:auto 1fr;gap:24px;align-items:start}
@media(max-width:780px){.layout{grid-template-columns:1fr;justify-items:center}}
</style>
</head>
<body>
<nav>
  <a class="nav-left" href="index.html">
    <img class="nav-logo-img" id="nav-logo" src="logo-dark.png" alt="Logo"/>
  </a>
  <div class="nav-right">
    <span class="nav-tag">scientific calculator</span>
    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
      <svg class="icon-moon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg class="icon-sun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/></svg>
    </button>
  </div>
</nav>
<div class="page">
  <div class="page-title">Scientific Calculator</div>
  <div class="page-sub">Trig · Logarithms · Exponents · History panel · Keyboard + paste support</div>
  <div class="layout">
    <div id="calc-root"></div>
    <div id="hist-root"></div>
  </div>
</div>

<!-- CALCULATOR STYLES - faithful FX-991CW recreation -->
<style>
/* ═══ CASIO BODY ═══ */
.fx991cw {
  width: 290px;
  background: #f2f2f2;
  border-radius: 12px 12px 40px 40px;
  padding: 0;
  box-shadow:
    0 0 0 1px #c8c8c8,
    0 4px 0 1px #b0b0b0,
    0 8px 2px rgba(0,0,0,.25),
    0 16px 40px rgba(0,0,0,.35);
  position: relative;
  font-family: 'Roboto', Arial, sans-serif;
  overflow: hidden;
}

/* Top navy banner */
.fx-top-banner {
  background: linear-gradient(180deg, #1a2a6c 0%, #0f1a50 100%);
  padding: 10px 14px 8px;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
}
.fx-brand-left { display: flex; flex-direction: column; gap: 1px; }
.fx-casio-text {
  font-size: 22px; font-weight: 900; letter-spacing: 3px;
  color: #fff; font-family: 'Roboto', Arial, sans-serif; line-height: 1;
}
.fx-model-text { font-size: 10px; color: #8fb3ff; letter-spacing: 1.5px; font-weight: 500; }
.fx-classwiz { font-size: 8px; color: #5588ff; letter-spacing: 1px; }
.fx-brand-right { text-align: right; }
.fx-natural { font-size: 7px; color: #aac4ff; letter-spacing: .5px; line-height: 1.5; }

/* Solar strip */
.fx-solar {
  background: linear-gradient(90deg, #0a0a0a, #1a2240, #0a0a0a);
  height: 9px; margin: 0 14px 0;
  border-radius: 0 0 2px 2px;
  display: flex; gap: 1px; padding: 1px 2px; overflow: hidden;
}
.fx-sc { flex: 1; background: linear-gradient(180deg,#1a3060,#0a1030); border-radius: 1px; }

/* Display area */
.fx-display-wrap {
  margin: 8px 10px 6px;
  background: #c5d8b0;
  border-radius: 4px;
  border: 2px solid #8a9e72;
  box-shadow: inset 0 2px 8px rgba(0,0,0,.32), inset 0 0 0 1px rgba(0,0,0,.1);
  padding: 5px 8px 6px;
  min-height: 72px;
  position: relative;
}
.fx-disp-indicators {
  display: flex; gap: 4px; margin-bottom: 2px; flex-wrap: wrap;
}
.fx-ind {
  font-size: 6px; color: #263a10;
  font-family: 'Roboto', sans-serif; font-weight: 700;
  opacity: .45; letter-spacing: .3px; line-height: 1;
  padding: 0 2px; border: .5px solid rgba(38,58,16,.35); border-radius: 1px;
}
.fx-ind.lit { opacity: 1; background: rgba(38,58,16,.15); }
.fx-disp-expr {
  font-size: 11px; color: #1a2e08;
  text-align: right; min-height: 15px;
  word-break: break-all; opacity: .75;
  font-family: 'DM Mono', monospace;
  letter-spacing: .2px; line-height: 1.3;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.fx-disp-result {
  font-size: 24px; color: #0e1e04;
  text-align: right; font-weight: 400;
  font-family: 'DM Mono', monospace;
  min-height: 30px; word-break: break-all;
  letter-spacing: .5px; line-height: 1.15;
}

/* Body below display */
.fx-body { background: #f2f2f2; padding: 4px 10px 18px; }

/* ── Button base ── */
.fx-btn-grid { display: flex; flex-direction: column; gap: 3px; }
.fx-row { display: flex; gap: 4px; justify-content: center; align-items: flex-end; }

/* outer wrapper keeps label + button together */
.bw { display: flex; flex-direction: column; align-items: center; position: relative; }

/* secondary labels above button */
.sl { /* shift label - yellow */
  font-size: 5.8px; color: #c8860a; font-weight: 800;
  font-family: 'Roboto', sans-serif; line-height: 1;
  margin-bottom: 2px; white-space: nowrap; min-height: 8px;
  text-align: center; width: 100%;
}
.al { /* alpha label - red */
  position: absolute; top: 0; right: -1px;
  font-size: 5.5px; color: #c0302a; font-weight: 800;
  font-family: 'Roboto', sans-serif; line-height: 1;
  white-space: nowrap;
}

/* The actual button */
.b {
  border: none; cursor: pointer; outline: none;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  border-radius: 50%;
  width: 38px; height: 38px;
  font-family: 'Roboto', Arial, sans-serif;
  font-size: 10px; font-weight: 700;
  line-height: 1.1; text-align: center;
  position: relative;
  transition: filter .07s, transform .07s;
  user-select: none; -webkit-user-select: none;
}
.b:active { transform: translateY(2px) scale(.97); filter: brightness(.82); }

/* Sub-label inside button (smaller text below main) */
.b-sub { font-size: 6px; font-weight: 400; opacity: .75; line-height: 1; margin-top: 1px; }

/* Colour variants */
/* Dark charcoal - numbers & main ops */
.bd {
  background: radial-gradient(ellipse at 40% 30%, #4a4a4a, #1c1c1c);
  color: #ffffff;
  box-shadow: 0 3px 0 #0a0a0a, 0 1px 3px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.12);
}
/* Medium grey - secondary functions */
.bm {
  background: radial-gradient(ellipse at 40% 30%, #8a8a8a, #5a5a5a);
  color: #fff;
  box-shadow: 0 3px 0 #333, 0 1px 3px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.15);
}
/* Light grey - some function keys */
.bl {
  background: radial-gradient(ellipse at 40% 30%, #e0e0e0, #bdbdbd);
  color: #111;
  box-shadow: 0 3px 0 #888, 0 1px 3px rgba(0,0,0,.3), inset 0 1px 0 rgba(255,255,255,.6);
}
/* Blue - SHIFT, ALPHA, navigation */
.bb {
  background: radial-gradient(ellipse at 40% 30%, #4a7ae0, #2348b8);
  color: #fff;
  box-shadow: 0 3px 0 #112090, 0 1px 3px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.2);
}
/* Orange-red = sign */
.bo {
  background: radial-gradient(ellipse at 40% 30%, #e86820, #c04408);
  color: #fff;
  box-shadow: 0 3px 0 #802000, 0 1px 3px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.18);
}
/* Red - AC/ON */
.br {
  background: radial-gradient(ellipse at 40% 30%, #d42020, #a00808);
  color: #fff;
  box-shadow: 0 3px 0 #600000, 0 1px 3px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.15);
}
/* Pill shapes */
.bwide  { border-radius: 12px; width: 58px; }
.bxwide { border-radius: 12px; width: 80px; }

/* Arrow nav cross */
.fx-nav { display: grid; grid-template-columns: 38px 38px 38px; grid-template-rows: 38px 38px 38px; gap: 3px; }
.fnb { width: 38px; height: 38px; } /* blank */
/* Arrow buttons get cut corners */
.b-up    { border-radius: 8px 8px 50% 50%; }
.b-down  { border-radius: 50% 50% 8px 8px; }
.b-left  { border-radius: 50% 8px 8px 50%; }
.b-right { border-radius: 8px 50% 50% 8px; }
.b-ok    { border-radius: 50%; }
</style>

<!-- HISTORY STYLES -->
<style>
.hist-panel{background:var(--bg2);border:1px solid var(--border);border-radius:16px;overflow:hidden;display:flex;flex-direction:column;min-width:280px}
.hist-head{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hist-title{font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:var(--text2)}
.hbtn{font-size:10px;padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);cursor:pointer;font-family:'DM Mono',monospace;transition:all .15s}
.hbtn:hover{border-color:var(--accent);color:var(--accent)}
.hist-list{flex:1;overflow-y:auto;max-height:480px}
.hist-list::-webkit-scrollbar{width:3px}
.hist-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.hist-empty{padding:40px 20px;text-align:center;font-size:11px;color:var(--text2);line-height:1.6}
.hist-item{padding:10px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;cursor:pointer;transition:background .12s}
.hist-item:hover{background:var(--bg3)}
.hist-item:last-child{border-bottom:none}
.hi-body{flex:1;min-width:0}
.hi-expr{font-size:10px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:'DM Mono',monospace}
.hi-result{font-size:16px;color:var(--text);font-weight:600;font-family:'DM Mono',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hi-copy{opacity:0;font-size:9px;padding:3px 8px;border-radius:5px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);cursor:pointer;font-family:'DM Mono',monospace;transition:all .15s;flex-shrink:0}
.hist-item:hover .hi-copy{opacity:1}
.hi-copy:hover{border-color:var(--green);color:var(--green)}
.hist-hint{padding:8px 18px 12px;font-size:10px;color:var(--text2);text-align:center;border-top:1px solid var(--border)}
</style>

<!-- BUILD CALCULATOR DOM -->
<script>
document.getElementById('calc-root').innerHTML = `
<div class="fx991cw">

  <!-- TOP NAVY BANNER -->
  <div class="fx-top-banner">
    <div class="fx-brand-left">
      <span class="fx-casio-text">CASIO</span>
      <span class="fx-model-text">fx-991CW</span>
      <span class="fx-classwiz">ClassWiz</span>
    </div>
    <div class="fx-brand-right">
      <div class="fx-natural">NATURAL-V.P.A.M.<br/>552 FUNCTIONS</div>
    </div>
  </div>

  <!-- SOLAR STRIP -->
  <div class="fx-solar">${Array(16).fill('<div class="fx-sc"></div>').join('')}</div>

  <!-- DISPLAY -->
  <div class="fx-display-wrap">
    <div class="fx-disp-indicators">
      <span class="fx-ind" id="di-s">S</span>
      <span class="fx-ind" id="di-a">A</span>
      <span class="fx-ind" id="di-m">M</span>
      <span class="fx-ind" id="di-sto">STO</span>
      <span class="fx-ind" id="di-rcl">RCL</span>
      <span class="fx-ind" id="di-d">D</span>
      <span class="fx-ind" id="di-r">R</span>
      <span class="fx-ind" id="di-g">G</span>
      <span class="fx-ind" id="di-fix">FIX</span>
      <span class="fx-ind" id="di-sci">SCI</span>
    </div>
    <div class="fx-disp-expr" id="disp-expr"></div>
    <div class="fx-disp-result" id="disp-ans">0</div>
  </div>

  <div class="fx-body">
  <div class="fx-btn-grid">

    <!-- ROW 1: MENU  HOME  UNDO  ON -->
    <div class="fx-row">
      <div class="bw"><div class="sl">CATALOG</div><button class="b bm" onclick="cp('MENU')" style="font-size:8px;font-weight:900">MENU</button></div>
      <div class="bw"><div class="sl">RESET</div><button class="b bm" onclick="cp('HOME')" style="font-size:8px;font-weight:900">HOME</button></div>
      <div class="bw"><div class="sl">INS</div><button class="b bm" onclick="doUndo()" style="font-size:8px;font-weight:900">UNDO</button></div>
      <div class="bw"><div class="sl">OFF</div><button class="b br" onclick="doClear(true)" style="font-size:10px;font-weight:900;letter-spacing:.5px">ON</button></div>
    </div>

    <!-- ROW 2: SHIFT  ALPHA  x10^x  Ans -->
    <div class="fx-row">
      <div class="bw"><div class="sl">&nbsp;</div><button class="b bb" id="btn-shift" onclick="toggleShift()" style="font-size:8px;font-weight:900;letter-spacing:.3px">SHIFT</button></div>
      <div class="bw"><div class="sl">&nbsp;</div><button class="b bb" id="btn-alpha" onclick="toggleAlpha()" style="font-size:8px;font-weight:900;letter-spacing:.3px">ALPHA</button></div>
      <div class="bw"><div class="sl">10<sup>x</sup></div><button class="b bd" onclick="appendStr('×10^(')" style="font-size:8px">×10<sup style="font-size:6px">x</sup></button></div>
      <div class="bw"><div class="sl">DRG▸</div><button class="b bd" onclick="appendAns()" style="font-size:9px;font-weight:900">Ans</button></div>
    </div>

    <!-- ROW 3: x²  x⁻¹  x!  √ -->
    <div class="fx-row">
      <div class="bw"><div class="sl">x³</div><button class="b bd" onclick="appendStr('^2')" style="font-size:11px">x²</button></div>
      <div class="bw"><div class="sl">∛</div><button class="b bd" onclick="appendStr('^(-1)')" style="font-size:11px">x⁻¹</button></div>
      <div class="bw"><div class="sl">nPr</div><button class="b bd" onclick="appendStr('!')" style="font-size:11px">x!</button></div>
      <div class="bw"><div class="sl"><sup>x</sup>√</div><button class="b bd" onclick="appendStr('√(')" style="font-size:14px">√</button></div>
    </div>

    <!-- ROW 4: log  ln  ^  (  ) -->
    <div class="fx-row">
      <div class="bw"><div class="sl">10<sup>x</sup></div><button class="b bd" onclick="appendStr('log(')" style="font-size:10px">log</button></div>
      <div class="bw"><div class="sl">e<sup>x</sup></div><button class="b bd" onclick="appendStr('ln(')" style="font-size:10px">ln</button></div>
      <div class="bw"><div class="sl">Abs</div><button class="b bd" onclick="appendStr('^(')" style="font-size:12px;font-weight:900">^</button></div>
      <div class="bw"><div class="sl">Pol(</div><button class="b bm" onclick="appendStr('(')" style="font-size:14px;font-weight:700">(</button></div>
      <div class="bw"><div class="sl">Rec(</div><button class="b bm" onclick="appendStr(')')" style="font-size:14px;font-weight:700">)</button></div>
    </div>

    <!-- ROW 5: sin  cos  tan  ,  % -->
    <div class="fx-row">
      <div class="bw"><div class="sl">sin⁻¹</div><button class="b bd" onclick="appendStr('sin(')" style="font-size:10px">sin</button></div>
      <div class="bw"><div class="sl">cos⁻¹</div><button class="b bd" onclick="appendStr('cos(')" style="font-size:10px">cos</button></div>
      <div class="bw"><div class="sl">tan⁻¹</div><button class="b bd" onclick="appendStr('tan(')" style="font-size:10px">tan</button></div>
      <div class="bw"><div class="sl">°'"</div><button class="b bm" onclick="appendStr(',')" style="font-size:12px">,</button></div>
      <div class="bw"><div class="sl">Ran#</div><button class="b bm" onclick="appendStr('%')" style="font-size:12px">%</button></div>
    </div>

    <!-- NAVIGATION CROSS -->
    <div class="fx-row" style="margin:2px 0">
      <div class="bw"><div class="sl">&nbsp;</div>
        <div class="fx-nav">
          <div class="fnb"></div>
          <button class="b bm b-up" onclick="histUp()" style="font-size:11px">▲</button>
          <div class="fnb"></div>
          <button class="b bm b-left" onclick="cursorLeft()" style="font-size:11px">◀</button>
          <button class="b bl b-ok" onclick="doEquals()" style="font-size:11px;font-weight:900;color:#111">=</button>
          <button class="b bm b-right" onclick="cursorRight()" style="font-size:11px">▶</button>
          <div class="fnb"></div>
          <button class="b bm b-down" onclick="histDown()" style="font-size:11px">▼</button>
          <div class="fnb"></div>
        </div>
      </div>
    </div>

    <!-- ROW 6: DEL  AC  ÷  × -->
    <div class="fx-row">
      <div class="bw"><div class="sl">INS</div><button class="b bm bwide" onclick="doBackspace()" style="font-size:9px;font-weight:900">DEL</button></div>
      <div class="bw"><div class="sl">CLR</div><button class="b br bwide" onclick="doClear(false)" style="font-size:9px;font-weight:900;letter-spacing:.5px">AC</button></div>
      <div class="bw"><div class="sl">INTG</div><button class="b bd" onclick="appendStr('/')" style="font-size:15px">÷</button></div>
      <div class="bw"><div class="sl">d/dx</div><button class="b bd" onclick="appendStr('*')" style="font-size:15px">×</button></div>
    </div>

    <!-- ROW 7: 7  8  9  − -->
    <div class="fx-row">
      <div class="bw"><div class="sl">A</div><button class="b bd" onclick="appendNum('7')" style="font-size:16px;font-weight:500">7</button></div>
      <div class="bw"><div class="sl">B</div><button class="b bd" onclick="appendNum('8')" style="font-size:16px;font-weight:500">8</button></div>
      <div class="bw"><div class="sl">C</div><button class="b bd" onclick="appendNum('9')" style="font-size:16px;font-weight:500">9</button></div>
      <div class="bw"><div class="sl">Neg</div><button class="b bd" onclick="appendStr('-')" style="font-size:18px;font-weight:300">−</button></div>
    </div>

    <!-- ROW 8: 4  5  6  + -->
    <div class="fx-row">
      <div class="bw"><div class="sl">D</div><button class="b bd" onclick="appendNum('4')" style="font-size:16px;font-weight:500">4</button></div>
      <div class="bw"><div class="sl">E</div><button class="b bd" onclick="appendNum('5')" style="font-size:16px;font-weight:500">5</button></div>
      <div class="bw"><div class="sl">F</div><button class="b bd" onclick="appendNum('6')" style="font-size:16px;font-weight:500">6</button></div>
      <div class="bw"><div class="sl">M+</div><button class="b bd" onclick="appendStr('+')" style="font-size:18px;font-weight:300">+</button></div>
    </div>

    <!-- ROW 9: 1  2  3  (−) -->
    <div class="fx-row">
      <div class="bw"><div class="sl">M-</div><button class="b bd" onclick="appendNum('1')" style="font-size:16px;font-weight:500">1</button></div>
      <div class="bw"><div class="sl">MRC</div><button class="b bd" onclick="appendNum('2')" style="font-size:16px;font-weight:500">2</button></div>
      <div class="bw"><div class="sl">STO</div><button class="b bd" onclick="appendNum('3')" style="font-size:16px;font-weight:500">3</button></div>
      <div class="bw"><div class="sl">RCL</div><button class="b bm" onclick="toggleNeg()" style="font-size:9px;font-weight:700">(−)</button></div>
    </div>

    <!-- ROW 10: 0 (wide)  .  EXE -->
    <div class="fx-row">
      <div class="bw"><div class="sl">Rnd</div><button class="b bd bxwide" onclick="appendNum('0')" style="font-size:16px;font-weight:500">0</button></div>
      <div class="bw"><div class="sl">π</div><button class="b bd" onclick="appendStr('.')" style="font-size:16px;font-weight:700">.</button></div>
      <div class="bw"><div class="sl">&nbsp;</div><button class="b bo" onclick="doEquals()" style="font-size:9px;font-weight:900;letter-spacing:.3px">EXE</button></div>
    </div>

  </div><!-- /btn-grid -->
  </div><!-- /fx-body -->
</div>`;

document.getElementById('hist-root').innerHTML = `
<div class="hist-panel">
  <div class="hist-head">
    <span class="hist-title">History</span>
    <button class="hbtn" onclick="clearHist()">Clear all</button>
  </div>
  <div class="hist-list" id="hist-list">
    <div class="hist-empty">No calculations yet.<br>Results appear here.</div>
  </div>
  <div class="hist-hint">Click a result to paste into calculator · hover to copy</div>
</div>`;
</script>

<!-- ENGINE -->
<script>
// ── STATE ──
let expr = '', cursorPos = 0, lastAns = 0;
let history = [], histIdx = -1;
let shiftOn = false, alphaOn = false;

const $expr = () => document.getElementById('disp-expr');
const $ans  = () => document.getElementById('disp-ans');

function render() {
  const e = $expr(); if (!e) return;
  const display = (expr.slice(0,cursorPos) + '▌' + expr.slice(cursorPos))
    .replace(/\*/g,'×').replace(/\//g,'÷').replace(/sqrt/g,'√');
  e.textContent = display || '';
}

function appendStr(s) {
  expr = expr.slice(0,cursorPos) + s + expr.slice(cursorPos);
  cursorPos += s.length; render();
}
function appendNum(n) { appendStr(n); }
function appendAns()  { appendStr(String(lastAns)); }
function cursorLeft()  { cursorPos = Math.max(0, cursorPos-1); render(); }
function cursorRight() { cursorPos = Math.min(expr.length, cursorPos+1); render(); }
function histUp()   { if (histIdx < history.length-1) { histIdx++; loadHist(histIdx); } }
function histDown() { if (histIdx > 0) { histIdx--; loadHist(histIdx); } else { histIdx=-1; expr=''; cursorPos=0; render(); } }
function loadHist(i){ expr = history[i].expr; cursorPos = expr.length; render(); }

function doBackspace() {
  if (cursorPos===0) return;
  expr = expr.slice(0,cursorPos-1) + expr.slice(cursorPos);
  cursorPos--; render();
}
function doClear(full) {
  expr=''; cursorPos=0; histIdx=-1;
  if (full) { lastAns=0; if($ans()) $ans().textContent='0'; }
  render();
  if($expr()) $expr().textContent='';
}
function doUndo() { doBackspace(); }
function cp(x) {} // MENU/HOME stubs

function toggleNeg() {
  if (expr===''||expr==='0') { appendStr('-'); return; }
  if (expr.startsWith('-')) { expr=expr.slice(1); cursorPos=Math.max(0,cursorPos-1); }
  else { expr='-'+expr; cursorPos++; }
  render();
}
function toggleShift() {
  shiftOn=!shiftOn; alphaOn=false;
  document.getElementById('btn-shift').style.boxShadow = shiftOn
    ? '0 0 0 2px #c8860a, 0 3px 0 #112090' : '';
  document.getElementById('btn-alpha').style.boxShadow = '';
  document.getElementById('di-s').classList.toggle('lit', shiftOn);
  document.getElementById('di-a').classList.remove('lit');
}
function toggleAlpha() {
  alphaOn=!alphaOn; shiftOn=false;
  document.getElementById('btn-alpha').style.boxShadow = alphaOn
    ? '0 0 0 2px #c0302a, 0 3px 0 #112090' : '';
  document.getElementById('btn-shift').style.boxShadow = '';
  document.getElementById('di-a').classList.toggle('lit', alphaOn);
  document.getElementById('di-s').classList.remove('lit');
}

// ── EVALUATE ──
function doEquals() {
  if (!expr.trim()) return;
  const raw = expr;
  try {
    const result = safeEval(raw);
    if (result===null||result===undefined||typeof result!=='number'||isNaN(result)) throw 0;
    if (!isFinite(result)) throw 0;
    const rounded = parseFloat(result.toPrecision(10));
    lastAns = rounded;
    if($expr()) $expr().textContent = raw.replace(/\*/g,'×').replace(/\//g,'÷').replace(/sqrt/g,'√');
    if($ans())  $ans().textContent  = fmtResult(rounded);
    addHist(raw, rounded);
    expr = String(rounded); cursorPos = expr.length; histIdx = -1;
  } catch(e) {
    if($ans()) { $ans().textContent='Math ERROR'; setTimeout(()=>{ if($ans()) $ans().textContent=fmtResult(lastAns)||'0'; },1400); }
  }
}

function fmtResult(n) {
  if (n===0) return '0';
  if (Math.abs(n)>=1e10 || (Math.abs(n)<0.001 && n!==0)) {
    return n.toExponential(6).replace(/e\+?(-?)0*(\d+)/,(_, s, d)=>`×10^${s}${d}`);
  }
  return parseFloat(n.toPrecision(10)).toString();
}

// ── SAFE MATH EVAL ──
function safeEval(raw) {
  let s = raw
    .replace(/×/g,'*').replace(/÷/g,'/')
    .replace(/√\(/g,'Math.sqrt(')
    .replace(/sqrt\(/g,'Math.sqrt(')
    .replace(/log\(/g,'Math.log10(')
    .replace(/ln\(/g,'Math.log(')
    .replace(/sin\(/g,'__sin(')
    .replace(/cos\(/g,'__cos(')
    .replace(/tan\(/g,'__tan(')
    .replace(/π/g,'Math.PI')
    .replace(/×10\^\(/g,'*Math.pow(10,')
    .replace(/\^/g,'**');
  // factorial
  s = s.replace(/(\d+)!/g, (_,n)=>String(factorial(+n)));
  // close parens
  const open = (s.match(/\(/g)||[]).length-(s.match(/\)/g)||[]).length;
  s += ')'.repeat(Math.max(0,open));
  const __sin=x=>Math.sin(x*Math.PI/180);
  const __cos=x=>Math.cos(x*Math.PI/180);
  const __tan=x=>Math.tan(x*Math.PI/180);
  return Function('"use strict";const __sin='+__sin+';const __cos='+__cos+';const __tan='+__tan+'; return('+s+')')();
}

function factorial(n) {
  if(n<0||n>170||!Number.isInteger(n)) return NaN;
  let r=1; for(let i=2;i<=n;i++) r*=i; return r;
}

// ── HISTORY ──
function addHist(ex, res) {
  history.unshift({expr:ex, result:res});
  if(history.length>80) history.pop();
  renderHist();
}
function renderHist() {
  const list = document.getElementById('hist-list');
  if (!list) return;
  if (!history.length) { list.innerHTML='<div class="hist-empty">No calculations yet.<br>Results appear here.</div>'; return; }
  list.innerHTML = history.map((h,i)=>`
    <div class="hist-item" onclick="pasteResult(${i})">
      <div class="hi-body">
        <div class="hi-expr">${h.expr.replace(/\*/g,'×').replace(/\//g,'÷')}</div>
        <div class="hi-result">= ${fmtResult(h.result)}</div>
      </div>
      <button class="hi-copy" onclick="event.stopPropagation();copyResult(${i})">Copy</button>
    </div>`).join('');
}
function pasteResult(i) {
  const v=String(history[i].result);
  expr=expr.slice(0,cursorPos)+v+expr.slice(cursorPos);
  cursorPos+=v.length; render();
}
function copyResult(i) {
  navigator.clipboard.writeText(String(history[i].result))
    .then(()=>toast('Copied!'));
}
function clearHist() { history=[]; renderHist(); }

// ── KEYBOARD ──
document.addEventListener('keydown', e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
  if(e.key>='0'&&e.key<='9') appendNum(e.key);
  else if(e.key==='.') appendStr('.');
  else if(e.key==='+') appendStr('+');
  else if(e.key==='-') appendStr('-');
  else if(e.key==='*') appendStr('*');
  else if(e.key==='/'){e.preventDefault();appendStr('/');}
  else if(e.key==='(') appendStr('(');
  else if(e.key===')') appendStr(')');
  else if(e.key==='^') appendStr('^(');
  else if(e.key==='Enter'||e.key==='=') doEquals();
  else if(e.key==='Backspace') doBackspace();
  else if(e.key==='Escape') doClear(false);
  else if(e.key==='ArrowLeft') cursorLeft();
  else if(e.key==='ArrowRight') cursorRight();
  else if(e.key==='ArrowUp') histUp();
  else if(e.key==='ArrowDown') histDown();
});

// ── PASTE ──
document.addEventListener('paste', e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
  e.preventDefault();
  const txt=(e.clipboardData||window.clipboardData).getData('text');
  const clean=txt.replace(/[^\d.\-+*/()^%]/g,'');
  if(clean) appendStr(clean);
});

// ── TOAST ──
function toast(msg) {
  let t=document.getElementById('fx-toast');
  if(!t){t=document.createElement('div');t.id='fx-toast';
    t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#6aff7e;color:#000;padding:8px 18px;border-radius:8px;font-family:DM Mono,monospace;font-size:12px;font-weight:700;transition:transform .3s cubic-bezier(.34,1.56,.64,1);z-index:9999;pointer-events:none';
    document.body.appendChild(t);}
  t.textContent=msg;t.style.transform='translateX(-50%) translateY(0)';
  setTimeout(()=>{t.style.transform='translateX(-50%) translateY(80px)';},1800);
}

// ── THEME ──
const _sv=localStorage.getItem('theme')||'dark';
document.documentElement.setAttribute('data-theme',_sv);
const _nl=document.getElementById('nav-logo');
if(_nl) _nl.src=_sv==='dark'?'logo-dark.png':'logo-light.png';
function toggleTheme(){
  const t=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',t);
  const nl=document.getElementById('nav-logo');
  if(nl) nl.src=t==='dark'?'logo-dark.png':'logo-light.png';
  localStorage.setItem('theme',t);
}

render();
</script>
</body>
</html>
