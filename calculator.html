}
[data-theme="light"]{
  --bg:#f4f4f8;--bg2:#ffffff;--bg3:#ebebf2;--border:#d0d0e0;
  --text:#0e0e1a;--text2:#6060a0;--accent:#0099cc;--green:#22a83a;

}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;overflow-x:hidden;transition:background .3s,color .3s}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0}

.nav-tag{font-size:10px;letter-spacing:.2em;color:var(--text2);text-transform:uppercase}
.theme-toggle{width:34px;height:34px;border-radius:9px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.theme-toggle:hover{border-color:var(--accent);color:var(--accent)}
.icon-sun{display:none}.icon-moon{display:block}
[data-theme="light"] .icon-sun{display:block}[data-theme="light"] .icon-moon{display:none}
.page{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:36px 24px 80px}
.page-header{margin-bottom:28px}
.page-title{font-family:'Big Shoulders Display',sans-serif;font-size:clamp(32px,6vw,52px);font-weight:900;background:linear-gradient(135deg,var(--text) 40%,var(--accent) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
.page-sub{font-size:11px;color:var(--text2);margin-top:6px}
.layout{display:grid;grid-template-columns:auto 1fr;gap:28px;align-items:start}
@media(max-width:800px){.layout{grid-template-columns:1fr}}
</style>

<!-- CALCULATOR ENGINE -->
<script>
let expr = '';
let lastAns = 0;
let history = [];
let shiftOn = false, alphaOn = false;
let cursorPos = 0;

const elExpr = () => document.getElementById('disp-expr');
const elAns  = () => document.getElementById('disp-ans');

function updateDisplay() {
  const e = elExpr();
  const a = elAns();
  if (!e || !a) return;
  // Show cursor in expression
  const disp = expr.slice(0, cursorPos) + '|' + expr.slice(cursorPos);
  e.textContent = disp.replace(/\*/g,'×').replace(/\//g,'÷');
  if (expr === '') { a.textContent = '0'; }
}

function appendStr(s) {
  expr = expr.slice(0, cursorPos) + s + expr.slice(cursorPos);
  cursorPos += s.length;
  updateDisplay();
}

function appendNum(n) { appendStr(n); }

function appendAns() { appendStr(String(lastAns)); }

function cursorMove(d) { /* up/down for history navigation — stub */ }
function cursorMoveLeft()  { cursorPos = Math.max(0, cursorPos - 1); updateDisplay(); }
function cursorMoveRight() { cursorPos = Math.min(expr.length, cursorPos + 1); updateDisplay(); }

function doBackspace() {
  if (cursorPos === 0) return;
  expr = expr.slice(0, cursorPos - 1) + expr.slice(cursorPos);
  cursorPos--;
  updateDisplay();
}

function doClear(full) {
  expr = ''; cursorPos = 0;
  if (full) { lastAns = 0; elAns().textContent = '0'; }
  elExpr().textContent = '';
  updateDisplay();
}

function doUndo() { doBackspace(); }

function toggleNeg() {
  if (expr === '' || expr === '0') { appendStr('-'); return; }
  if (expr.startsWith('-')) { expr = expr.slice(1); cursorPos = Math.max(0, cursorPos-1); }
  else { expr = '-' + expr; cursorPos++; }
  updateDisplay();
}

function toggleMode(m) {
  if (m === 'shift') {
    shiftOn = !shiftOn; alphaOn = false;
    document.getElementById('btn-shift').style.opacity = shiftOn ? '1' : '0.7';
    document.getElementById('btn-alpha').style.opacity = '0.7';
    document.getElementById('ds-s').classList.toggle('on', shiftOn);
    document.getElementById('ds-a').classList.remove('on');
  } else {
    alphaOn = !alphaOn; shiftOn = false;
    document.getElementById('btn-alpha').style.opacity = alphaOn ? '1' : '0.7';
    document.getElementById('btn-shift').style.opacity = '0.7';
    document.getElementById('ds-a').classList.toggle('on', alphaOn);
    document.getElementById('ds-s').classList.remove('on');
  }
}

function cp(label) { /* MENU/HOME stubs */ }

// ── EVALUATE ──
function doEquals() {
  if (expr.trim() === '') return;
  const raw = expr;
  try {
    const result = safeEval(raw);
    if (result === null || result === undefined || isNaN(result)) throw new Error('Invalid');
    const rounded = parseFloat(result.toPrecision(10));
    lastAns = rounded;
    elExpr().textContent = raw.replace(/\*/g,'×').replace(/\//g,'÷');
    elAns().textContent = formatResult(rounded);
    addHistory(raw, rounded);
    expr = String(rounded);
    cursorPos = expr.length;
  } catch(e) {
    elAns().textContent = 'Math ERROR';
    setTimeout(() => { elAns().textContent = expr || '0'; }, 1200);
  }
}

function formatResult(n) {
  if (Math.abs(n) >= 1e10 || (Math.abs(n) < 1e-4 && n !== 0)) {
    return n.toExponential(6).replace(/e\+?(-?)(\d+)/, (_, s, d) => `×10^${s}${parseInt(d)}`);
  }
  const s = parseFloat(n.toPrecision(10)).toString();
  return s;
}

// ── SAFE EVAL ──
function safeEval(raw) {
  let s = raw
    .replace(/×/g,'*').replace(/÷/g,'/')
    .replace(/sqrt\(/g,'Math.sqrt(')
    .replace(/log\(/g,'Math.log10(')
    .replace(/ln\(/g,'Math.log(')
    .replace(/sin\(/g,'Math.sin(DEG(')
    .replace(/cos\(/g,'Math.cos(DEG(')
    .replace(/tan\(/g,'Math.tan(DEG(')
    .replace(/π/g,'Math.PI')
    .replace(/×10\^\(/g,'*Math.pow(10,')
    .replace(/\^/g,'**')
    .replace(/(\d+)!/g, (_, n) => factorial(parseInt(n)));

  // close unmatched parens
  let open = (s.match(/\(/g)||[]).length - (s.match(/\)/g)||[]).length;
  s += ')'.repeat(Math.max(0, open));

  // DEG helper for trig
  s = s.replace(/Math\.(sin|cos|tan)\(DEG\(/g, (_, fn) => `Math.${fn}(Math.PI/180*(`);

  return Function('"use strict"; return (' + s + ')')();
}

function factorial(n) {
  if (n < 0 || n > 170) return NaN;
  if (n === 0 || n === 1) return 1;
  let r = 1;
  for (let i = 2; i <= n; i++) r *= i;
  return r;
}

function DEG(x) { return x * Math.PI / 180; }

// ── HISTORY ──
function addHistory(ex, res) {
  history.unshift({ expr: ex, result: res });
  if (history.length > 50) history.pop();
  renderHistory();
}

function renderHistory() {
  const list = document.getElementById('hist-list');
  const empty = document.getElementById('hist-empty');
  if (!list) return;
  if (history.length === 0) {
    list.innerHTML = '<div class="hist-empty" id="hist-empty">No calculations yet.<br>Results will appear here.</div>';
    return;
  }
  list.innerHTML = history.map((h, i) => `
    <div class="hist-item" onclick="pasteResult(${i})">
      <div class="hi-meta">
        <div class="hi-expr">${h.expr.replace(/\*/g,'×').replace(/\//g,'÷')}</div>
        <div class="hi-result">= ${formatResult(h.result)}</div>
      </div>
      <button class="hi-copy" onclick="event.stopPropagation();copyResult(${i})" title="Copy">Copy</button>
    </div>`).join('');
}

function pasteResult(i) {
  const val = String(history[i].result);
  expr = expr.slice(0, cursorPos) + val + expr.slice(cursorPos);
  cursorPos += val.length;
  updateDisplay();
}

function copyResult(i) {
  navigator.clipboard.writeText(String(history[i].result)).then(() => showToast('Copied!'));
}

function clearHistory() { history = []; renderHistory(); }

// ── TOAST ──
function showToast(msg) {
  let t = document.getElementById('calc-toast');
  if (!t) { t = document.createElement('div'); t.id='calc-toast'; t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#6aff7e;color:#000;padding:8px 18px;border-radius:8px;font-family:DM Mono,monospace;font-size:12px;font-weight:700;transition:transform .3s cubic-bezier(.34,1.56,.64,1);z-index:999;pointer-events:none'; document.body.appendChild(t); }
  t.textContent = msg;
  t.style.transform = 'translateX(-50%) translateY(0)';
  setTimeout(() => { t.style.transform = 'translateX(-50%) translateY(80px)'; }, 1800);
}

// ── KEYBOARD INPUT ──
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
  if (e.key >= '0' && e.key <= '9') appendNum(e.key);
  else if (e.key === '.') appendStr('.');
  else if (e.key === '+') appendStr('+');
  else if (e.key === '-') appendStr('-');
  else if (e.key === '*') appendStr('*');
  else if (e.key === '/') { e.preventDefault(); appendStr('/'); }
  else if (e.key === '(') appendStr('(');
  else if (e.key === ')') appendStr(')');
  else if (e.key === 'Enter' || e.key === '=') doEquals();
  else if (e.key === 'Backspace') doBackspace();
  else if (e.key === 'Escape') doClear(false);
  else if (e.key === 'ArrowLeft') cursorMoveLeft();
  else if (e.key === 'ArrowRight') cursorMoveRight();
});

// ── PASTE SUPPORT ──
document.addEventListener('paste', e => {
  if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
  e.preventDefault();
  const txt = (e.clipboardData || window.clipboardData).getData('text');
  const nums = txt.replace(/[^0-9.\-+*/()]/g, '');
  if (nums) appendStr(nums);
});

// ── INIT ──
updateDisplay();
</script>
